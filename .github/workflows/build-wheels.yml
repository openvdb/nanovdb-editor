    #     with zipfile.ZipFile(wheel) as zf:
    #         names = zf.namelist()
    #     llvm_hits = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang-llvm" in n]
    #     if not llvm_hits:
    #         slang_libs = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang" in n]
    #         print("libslang-llvm was not found in wheel; available Slang libs:", file=sys.stderr)
    #         for name in slang_libs:
    #             print(f" - {name}", file=sys.stderr)
    #         raise SystemExit(1)
    #     print("Found libslang-llvm entries:")
    #     for name in llvm_hits:
    #         print(f" - {name}")
    #     PY

    - name: Smoke test Linux x86_64 wheel on runner
      shell: bash
      run: |
        set -euo pipefail
        TEST_VENV="$(mktemp -d)/venv"
        python -m venv "${TEST_VENV}"
        "${TEST_VENV}/bin/python" -m pip install --upgrade pip
        "${TEST_VENV}/bin/python" -m pip install numpy ./wheelhouse/nanovdb_editor*.whl
        "${TEST_VENV}/bin/python" -c "import nanovdb_editor; print('Import successful')"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ubuntu-latest-x86_64-${{ matrix.manylinux_tag }}
        path: ./wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [validate_version]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      run: |
        sed -i.bak 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        rm -f pymodule/pyproject.toml.bak
        grep "name =" pymodule/pyproject.toml

    - name: Build sdist
      run: pipx run build --sdist
      working-directory: pymodule

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: pymodule/dist/*.tar.gz
