name: Build Wheels

on:
  workflow_call:
    inputs:
      is_dev:
        description: 'Whether to build as dev package (nanovdb-editor-dev) with -dev version suffix'
        required: true
        type: boolean
      manage_slang_image:
        description: 'Whether to check/publish Slang GHCR image from Linux x86_64 wheels'
        required: false
        type: boolean
        default: false
      linux_x86_build_slang_from_source:
        description: 'Whether the Linux x86_64 wheel should build Slang from source'
        required: false
        type: boolean
        default: false
    outputs:
      version_valid:
        description: 'Whether version validation passed'
        value: ${{ jobs.validate_version.outputs.version_valid }}
  workflow_dispatch:
    inputs:
      is_dev:
        description: 'Build as dev package (nanovdb-editor-dev)'
        required: false
        type: boolean
        default: false
      manage_slang_image:
        description: 'Check/publish Slang GHCR image from Linux x86_64 wheels'
        required: false
        type: boolean
        default: false
      linux_x86_build_slang_from_source:
        description: 'Build Slang from source for the Linux x86_64 wheel'
        required: false
        type: boolean
        default: false

jobs:
  validate_version:
    name: Validate tag version matches VERSION.txt
    runs-on: ubuntu-latest
    outputs:
      version_valid: ${{ steps.validate.outputs.version-valid || 'true' }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Validate version
      id: validate
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: ./.github/actions/validate-version
      with:
        allow-dev-suffix: ${{ inputs.is_dev }}

  resolve_slang_version:
    name: Resolve Slang Version
    runs-on: ubuntu-latest
    outputs:
      slang_version: ${{ steps.resolve.outputs.slang_version }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      image_name: ${{ steps.resolve.outputs.image_name }}
    steps:
    - uses: actions/checkout@v4

    - name: Parse Slang version from CMake config
      id: resolve
      run: |
        set -euo pipefail
        slang_version="$(python - <<'PY'
        import pathlib
        import re
        import sys

        text = pathlib.Path("cmake/packages.cmake").read_text(encoding="utf-8")
        match = re.search(r"set\s*\(\s*SLANG_VERSION\s+([0-9A-Za-z._-]+)\s*\)", text)
        if not match:
            print("Could not resolve SLANG_VERSION from cmake/packages.cmake", file=sys.stderr)
            raise SystemExit(1)
        print(match.group(1))
        PY
        )"
        image_tag="${slang_version}-ml28-v1"
        echo "slang_version=${slang_version}" >> "$GITHUB_OUTPUT"
        echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
        echo "image_name=nanovdb-editor-slang" >> "$GITHUB_OUTPUT"
        echo "Resolved Slang version: ${slang_version}"
        echo "Resolved Slang image tag: ${image_tag}"

  lookup_slang_image:
    name: Check Slang Image Exists
    needs: resolve_slang_version
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.lookup.outputs.exists }}
      image_ref: ${{ steps.lookup.outputs.image_ref }}
    env:
      IMAGE_NAME: ${{ needs.resolve_slang_version.outputs.image_name }}
      SLANG_VERSION: ${{ needs.resolve_slang_version.outputs.image_tag }}
    steps:
    - name: Look up cached Slang image
      id: lookup
      env:
        GHCR_USER: ${{ secrets.GHCR_PUSH_USERNAME }}
        GHCR_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
      run: |
        set -euo pipefail
        slang_tag="${SLANG_VERSION//[^0-9a-zA-Z._-]/-}"
        image_ref="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${slang_tag}"
        echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
        echo "Resolved Slang version tag: ${slang_tag}"

        # Login only when credentials are present (not available in fork PRs)
        if [[ -n "${GHCR_TOKEN:-}" && -n "${GHCR_USER:-}" ]]; then
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin >/dev/null 2>&1
        else
          echo "GHCR credentials not available (e.g. fork PR); checking image without login"
        fi

        if docker manifest inspect "${image_ref}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Found cached Slang image: ${image_ref}"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Slang image not found, build required: ${image_ref}"
        fi

  build_wheels:
    name: Build (${{ matrix.os }}${{ matrix.arch && format(' {0}', matrix.arch) || '' }})
    runs-on: ${{ matrix.os }}
    needs: [validate_version]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') }}
    env:
      CIBW_BUILD: ${{ matrix.cibw_build }}
      CIBW_BUILD_VERBOSITY: 1
      CIBW_TEST_REQUIRES: numpy
      CIBW_TEST_COMMAND: python -c "import nanovdb_editor; print('Import successful')"
      CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: ARM64
            cibw_build: "cp311-manylinux_aarch64"
            cibw_environment: >
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=/tmp/cpm-cache
          - os: macos-latest
            arch: ""
            cibw_build: "cp311-macosx_*"
            cibw_environment: >
              MACOSX_DEPLOYMENT_TARGET=15.0
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=/tmp/cpm-cache
          - os: windows-latest
            arch: ""
            cibw_build: "cp311-win_amd64"
            cibw_environment: >
              VCPKG_ROOT=C:/vcpkg
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_USE_VCPKG=ON -DNANOVDB_EDITOR_USE_H264=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=C:/cpm-cache
          - os: windows-11-arm
            arch: ARM64
            cibw_build: "cp311-win_arm64"
            cibw_environment: >
              VCPKG_ROOT=C:/vcpkg
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_USE_VCPKG=ON -DNANOVDB_EDITOR_USE_H264=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=C:/cpm-cache

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python (ARM64)
      if: matrix.os == 'windows-11-arm'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: arm64

    - name: Set up Python
      if: matrix.os != 'windows-11-arm'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      shell: bash
      run: |
        sed -i.bak 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        rm -f pymodule/pyproject.toml.bak
        grep "name =" pymodule/pyproject.toml

    - name: Seed cibuildwheel virtualenv cache (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $cacheDir = if ($env:CIBW_CACHE_PATH) {
          $env:CIBW_CACHE_PATH
        } else {
          Join-Path $env:LOCALAPPDATA 'pypa\cibuildwheel\Cache'
        }
        $target = Join-Path $cacheDir 'virtualenv-20.26.6.pyz'
        New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null

        if (Test-Path $target) {
          $size = (Get-Item $target).Length
          if ($size -gt 1024) {
            Write-Host "Using cached cibuildwheel virtualenv payload at $target ($size bytes)"
            exit 0
          }
          Remove-Item $target -Force
        }

        $urls = @(
          'https://raw.githubusercontent.com/pypa/get-virtualenv/20.26.6/public/virtualenv.pyz',
          'https://github.com/pypa/get-virtualenv/raw/20.26.6/public/virtualenv.pyz',
          'https://cdn.jsdelivr.net/gh/pypa/get-virtualenv@20.26.6/public/virtualenv.pyz'
        )

        foreach ($url in $urls) {
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              Write-Host "Downloading cibuildwheel virtualenv payload from $url (attempt $attempt)"
              Invoke-WebRequest -Uri $url -OutFile $target
              $size = (Get-Item $target).Length
              if ($size -le 1024) {
                throw "Downloaded file is unexpectedly small ($size bytes)"
              }
              Write-Host "Seeded cibuildwheel virtualenv cache at $target ($size bytes)"
              exit 0
            } catch {
              Write-Warning $_
              Remove-Item $target -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds (5 * $attempt)
            }
          }
        }

        throw "Failed to seed cibuildwheel virtualenv cache for Windows"

    - name: Seed cibuildwheel virtualenv cache (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail

        cache_dir="${CIBW_CACHE_PATH:-$HOME/Library/Caches/cibuildwheel}"
        target="${cache_dir}/virtualenv-20.26.6.pyz"
        mkdir -p "${cache_dir}"

        if [ -f "${target}" ]; then
          size="$(wc -c < "${target}")"
          if [ "${size}" -gt 1024 ]; then
            echo "Using cached cibuildwheel virtualenv payload at ${target} (${size} bytes)"
            exit 0
          fi
          rm -f "${target}"
        fi

        urls=(
          "https://raw.githubusercontent.com/pypa/get-virtualenv/20.26.6/public/virtualenv.pyz"
          "https://github.com/pypa/get-virtualenv/raw/20.26.6/public/virtualenv.pyz"
          "https://cdn.jsdelivr.net/gh/pypa/get-virtualenv@20.26.6/public/virtualenv.pyz"
        )

        for url in "${urls[@]}"; do
          for attempt in 1 2 3; do
            echo "Downloading cibuildwheel virtualenv payload from ${url} (attempt ${attempt})"
            if curl --fail --location --retry 3 --retry-all-errors --output "${target}" "${url}"; then
              size="$(wc -c < "${target}")"
              if [ "${size}" -gt 1024 ]; then
                echo "Seeded cibuildwheel virtualenv cache at ${target} (${size} bytes)"
                exit 0
              fi
              echo "Downloaded file is unexpectedly small (${size} bytes)"
            fi

            rm -f "${target}"
            sleep $((5 * attempt))
          done
        done

        echo "Failed to seed cibuildwheel virtualenv cache for macOS" >&2
        exit 1

    - name: Build Linux wheels
      if: runner.os == 'Linux'
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_34_x86_64:latest
        CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_34_aarch64:latest
        CIBW_ARCHS: ${{ matrix.os == 'ubuntu-24.04-arm' && 'aarch64' || 'auto' }}
        # Linux dependencies
        CIBW_BEFORE_ALL_LINUX: |
          if command -v dnf &> /dev/null; then
            dnf install -y cmake git
            dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
            dnf install -y miniz miniz-devel
          else
            yum install -y cmake git
            yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
            yum install -y miniz miniz-devel
          fi
          cmake --version

        CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
          set -e
          # Prefer an isolated auditwheel toolchain to avoid mismatches with
          # preinstalled pipx/system packages. Fall back to system python.
          AW_PYTHON=""
          AW_MODE=""
          AW_VENV="/tmp/nanovdb-auditwheel-venv"
          rm -rf "${AW_VENV}"
          if python -m venv "${AW_VENV}" >/dev/null 2>&1; then
            if "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir --upgrade pip >/dev/null 2>&1 && \
               "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir "auditwheel==6.6.0" "pyelftools==0.31" >/dev/null 2>&1; then
              AW_PYTHON="${AW_VENV}/bin/python"
              AW_MODE="python-module"
            else
              echo "Warning: failed to prepare isolated auditwheel environment, falling back to system python"
            fi
          else
            echo "Warning: python -m venv unavailable, falling back to system python"
          fi
          if [ -z "${AW_MODE}" ] && python -m auditwheel --version >/dev/null 2>&1; then
            AW_PYTHON="python"
            AW_MODE="python-module"
          fi
          if [ -z "${AW_MODE}" ] && command -v auditwheel >/dev/null 2>&1; then
            AW_MODE="binary"
          fi
          if [ -z "${AW_MODE}" ]; then
            echo "ERROR: no usable auditwheel runner found (venv/python module/binary)" >&2
            python -m pip --version || true
            python --version || true
            exit 1
          fi
          run_auditwheel() {
            if [ "${AW_MODE}" = "python-module" ]; then
              "${AW_PYTHON}" - "$@" <<'PY'
          import sys

          from auditwheel import main as auditwheel_main
          import auditwheel.elfutils as auditwheel_elfutils
          import auditwheel.wheel_abi as auditwheel_wheel_abi

          _orig_elf_find_versioned_symbols = auditwheel_elfutils.elf_find_versioned_symbols
          _orig_elf_is_python_extension = auditwheel_elfutils.elf_is_python_extension
          _orig_elf_find_ucs2_symbols = auditwheel_elfutils.elf_find_ucs2_symbols
          _orig_elf_references_pyfpe_jbuf = auditwheel_elfutils.elf_references_pyfpe_jbuf

          def _patched_elf_find_versioned_symbols(elf):
              section = elf.get_section_by_name(".gnu.version_r")
              if section is not None and not hasattr(section, "iter_versions"):
                  sh_type = None
                  try:
                      sh_type = section["sh_type"]
                  except Exception:
                      sh_type = "<unknown>"
                  print(
                      f"Warning: skipping unparsable .gnu.version_r section (type={sh_type})",
                      file=sys.stderr,
                  )
                  return iter(())
              return _orig_elf_find_versioned_symbols(elf)

          def _patched_elf_is_python_extension(fn, elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  sh_type = None
                  try:
                      sh_type = section["sh_type"]
                  except Exception:
                      sh_type = "<unknown>"
                  print(
                      f"Warning: skipping unparsable .dynsym section in {fn} (type={sh_type})",
                      file=sys.stderr,
                  )
                  return False, None
              return _orig_elf_is_python_extension(fn, elf)

          def _patched_elf_find_ucs2_symbols(elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  return iter(())
              return _orig_elf_find_ucs2_symbols(elf)

          def _patched_elf_references_pyfpe_jbuf(elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  return False
              return _orig_elf_references_pyfpe_jbuf(elf)

          auditwheel_elfutils.elf_find_versioned_symbols = _patched_elf_find_versioned_symbols
          auditwheel_elfutils.elf_is_python_extension = _patched_elf_is_python_extension
          auditwheel_elfutils.elf_find_ucs2_symbols = _patched_elf_find_ucs2_symbols
          auditwheel_elfutils.elf_references_pyfpe_jbuf = _patched_elf_references_pyfpe_jbuf
          auditwheel_wheel_abi.elf_find_versioned_symbols = _patched_elf_find_versioned_symbols
          auditwheel_wheel_abi.elf_is_python_extension = _patched_elf_is_python_extension
          auditwheel_wheel_abi.elf_find_ucs2_symbols = _patched_elf_find_ucs2_symbols
          auditwheel_wheel_abi.elf_references_pyfpe_jbuf = _patched_elf_references_pyfpe_jbuf

          sys.argv = ["auditwheel", *sys.argv[1:]]
          raise SystemExit(auditwheel_main.main())
          PY
            else
              auditwheel "$@"
            fi
          }
          echo "Using auditwheel mode: ${AW_MODE}${AW_PYTHON:+ (${AW_PYTHON})}"
          run_auditwheel --version
          SLANG_LIB_DIR="${NANOVDB_SLANG_IMAGE_LIB_DIR:-}"
          if [ -n "${SLANG_LIB_DIR}" ] && [ ! -d "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR=""
          fi
          if [ -z "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR="$(ls -d /tmp/cpm-cache/slang/*/lib 2>/dev/null | head -n1 || true)"
          fi
          SPIRV_LIB_PATH="$(python - <<'PY'
          import os
          targets = ("libSPIRV.so.15", "libSPIRV.so")
          roots = ("/project", "/tmp/cpm-cache", "/tmp")
          for root in roots:
              if not os.path.isdir(root):
                  continue
              for dirpath, _, filenames in os.walk(root):
                  for t in targets:
                      if t in filenames:
                          print(os.path.join(dirpath, t))
                          raise SystemExit(0)
          print("")
          PY
          )"
          if [ -n "${SLANG_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${SLANG_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using Slang runtime libs from ${SLANG_LIB_DIR}"
          fi
          if [ -n "${SPIRV_LIB_PATH}" ]; then
            SPIRV_LIB_DIR="$(dirname "${SPIRV_LIB_PATH}")"
            export LD_LIBRARY_PATH="${SPIRV_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using SPIRV runtime libs from ${SPIRV_LIB_DIR}"
            if [ ! -e "${SPIRV_LIB_DIR}/libSPIRV.so.15" ]; then
              SPIRV_COMPAT_DIR="/tmp/nanovdb-spirv-compat"
              mkdir -p "${SPIRV_COMPAT_DIR}"
              SPIRV_SRC_LIB=""
              if [ -e "${SPIRV_LIB_DIR}/libSPIRV.so" ]; then
                SPIRV_SRC_LIB="${SPIRV_LIB_DIR}/libSPIRV.so"
              else
                SPIRV_SRC_LIB="$(printf '%s\n' "${SPIRV_LIB_DIR}"/libSPIRV.so.15.* 2>/dev/null | head -n1 || true)"
              fi
              if [ -n "${SPIRV_SRC_LIB}" ] && [ -e "${SPIRV_SRC_LIB}" ]; then
                cp -f "${SPIRV_SRC_LIB}" "${SPIRV_COMPAT_DIR}/libSPIRV.so.15"
                export LD_LIBRARY_PATH="${SPIRV_COMPAT_DIR}:${LD_LIBRARY_PATH:-}"
                echo "Created compatibility copy: ${SPIRV_COMPAT_DIR}/libSPIRV.so.15 from ${SPIRV_SRC_LIB}"
              else
                echo "Warning: could not create SPIRV compatibility libSPIRV.so.15; source library not found in ${SPIRV_LIB_DIR}"
              fi
            fi
          else
            echo "Warning: could not locate libSPIRV.so* before auditwheel; relying on wheel-installed runtime libs"
          fi
          echo "=== auditwheel show ==="
          AUDITWHEEL_SHOW_FILE="/tmp/nanovdb-auditwheel-show.txt"
          rm -f "${AUDITWHEEL_SHOW_FILE}"
          run_auditwheel show {wheel} 2>&1 | tee "${AUDITWHEEL_SHOW_FILE}" || true
          case "{wheel}" in
            *aarch64*)
              AUDITWHEEL_DEFAULT_PLAT="manylinux_2_34_aarch64"
              ;;
            *)
              AUDITWHEEL_DEFAULT_PLAT="manylinux_2_34_x86_64"
              ;;
          esac
          AUDITWHEEL_PLAT="$(python - <<'PY' "${AUDITWHEEL_SHOW_FILE}" "${AUDITWHEEL_DEFAULT_PLAT}"
          import pathlib
          import re
          import sys

          show_path = pathlib.Path(sys.argv[1])
          default_plat = sys.argv[2]
          text = show_path.read_text(encoding="utf-8") if show_path.exists() else ""
          match = re.search(r'This constrains the platform tag to "([^"]+)"', text)
          print(match.group(1) if match else default_plat)
          PY
          )"
          echo "Using auditwheel platform from show output: ${AUDITWHEEL_PLAT}"
          run_auditwheel repair -w {dest_dir} {wheel} --lib-sdir .libs --plat "${AUDITWHEEL_PLAT}"

      with:
        package-dir: pymodule

    - name: Build macOS wheels
      if: runner.os == 'macOS'
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_ARCHS_MACOS: auto
      with:
        package-dir: pymodule

    - name: Build Windows wheels
      if: runner.os == 'Windows'
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_ARCHS_WINDOWS: ${{ matrix.os == 'windows-11-arm' && 'ARM64' || 'auto' }}
        # Windows dependencies
        CIBW_BEFORE_ALL_WINDOWS: |
          @echo on
          if not exist C:\vcpkg\.git (
            git clone --depth 1 https://github.com/microsoft/vcpkg C:\vcpkg
            if errorlevel 1 exit /b 1
          )
          call C:\vcpkg\bootstrap-vcpkg.bat
          if errorlevel 1 exit /b 1
          python -m pip install cmake
          if errorlevel 1 exit /b 1
          cmake --version
          if errorlevel 1 exit /b 1
      with:
        package-dir: pymodule

    - name: Verify Windows wheel bundles required runtime DLLs
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        python scripts/ci/verify_windows_runtime.py wheel --dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
        path: ./wheelhouse/*.whl

  build_slang_libraries:
    name: Build Slang Runtime Libs
    runs-on: ubuntu-latest
    needs: [validate_version, resolve_slang_version, lookup_slang_image]
    # Always prepare the reusable manylinux_2_28 Slang runtime image because the
    # x86_64 manylinux_2_28 wheel row depends on these older-baseline libs.
    if: ${{ !cancelled() && !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.lookup_slang_image.outputs.exists != 'true' }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Slang libs in manylinux environment
      shell: bash
      run: |
        set -euo pipefail
        rm -rf slang-package
        mkdir -p slang-package/lib slang-package/include

        SLANG_VERSION="${{ needs.resolve_slang_version.outputs.slang_version }}"
        LLVM_VERSION="$(python3 - <<'PY'
        import pathlib
        import re
        import sys

        text = pathlib.Path("cmake/packages.cmake").read_text()
        match = re.search(r'set\(NANOVDB_EDITOR_LLVM_VERSION\s+"([^"]+)"', text)
        if not match:
            print("Could not resolve NANOVDB_EDITOR_LLVM_VERSION from cmake/packages.cmake", file=sys.stderr)
            raise SystemExit(1)
        print(match.group(1))
        PY
        )"
        echo "Resolved Slang version: ${SLANG_VERSION}"
        echo "Resolved LLVM version: ${LLVM_VERSION}"

        # Build the cached Slang runtime libs on an older manylinux baseline so
        # the injected libslang-llvm remains repairable in the final wheel.
        docker run --rm -i \
          -e "SLANG_VERSION=${SLANG_VERSION}" \
          -e "LLVM_VERSION=${LLVM_VERSION}" \
          -v "${GITHUB_WORKSPACE}:/project" \
          -w /project \
          quay.io/pypa/manylinux_2_28_x86_64:latest \
          /bin/bash -s <<'BASH'
        set -euo pipefail
        export CPM_SOURCE_CACHE=/tmp/cpm-cache
        echo "=== Installing manylinux build dependencies ==="
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y cmake git make
          dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
          dnf install -y miniz miniz-devel
        else
          yum install -y cmake git make
          yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
          yum install -y miniz miniz-devel
        fi
        echo "=== Preparing standalone LLVM + Slang source build ==="
        cmake --version
        echo "Building Slang ${SLANG_VERSION} against LLVM ${LLVM_VERSION}"
        rm -rf /tmp/llvm-project /tmp/llvm-build /tmp/llvm-install /tmp/slang-src /tmp/slang-build /tmp/slang-install

        echo "=== Cloning LLVM ${LLVM_VERSION} ==="
        git clone --depth 1 --branch "llvmorg-${LLVM_VERSION}" https://github.com/llvm/llvm-project.git /tmp/llvm-project

        echo "=== Configuring LLVM ${LLVM_VERSION} ==="
        cmake -S /tmp/llvm-project/llvm -B /tmp/llvm-build -G "Unix Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/tmp/llvm-install \
          -DCMAKE_INSTALL_LIBDIR=lib \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DLLVM_ENABLE_PROJECTS=clang \
          -DLLVM_TARGETS_TO_BUILD=X86 \
          -DLLVM_ENABLE_ASSERTIONS=OFF \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_BUILD_TESTS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_BUILD_EXAMPLES=OFF \
          -DLLVM_INCLUDE_DOCS=OFF \
          -DCLANG_INCLUDE_TESTS=OFF \
          -DLLVM_BUILD_LLVM_DYLIB=OFF \
          -DLLVM_LINK_LLVM_DYLIB=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_ENABLE_ZLIB=OFF \
          -DLLVM_ENABLE_ZSTD=OFF \
          -DLLVM_ENABLE_LIBXML2=OFF

        echo "=== Building and installing LLVM ${LLVM_VERSION} ==="
        cmake --build /tmp/llvm-build --parallel "$(nproc)" --target install --verbose

        echo "=== Cloning Slang ${SLANG_VERSION} ==="
        git clone --depth 1 --branch "v${SLANG_VERSION}" --recurse-submodules https://github.com/shader-slang/slang.git /tmp/slang-src
        git -C /tmp/slang-src submodule update --init --recursive --depth 1

        echo "=== Configuring Slang ${SLANG_VERSION} ==="
        cmake -S /tmp/slang-src -B /tmp/slang-build -G "Unix Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/tmp/slang-install \
          -DCMAKE_INSTALL_LIBDIR=lib \
          -DCMAKE_BUILD_RPATH=/tmp/slang-build/external/miniz \
          -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
          -DCMAKE_INSTALL_RPATH=\$ORIGIN \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DBUILD_SHARED_LIBS=ON \
          -DSLANG_ENABLE_TESTS=OFF \
          -DSLANG_ENABLE_EXAMPLES=OFF \
          -DSLANG_ENABLE_SLANG_RHI=OFF \
          -DSLANG_ENABLE_GFX=OFF \
          -DSLANG_SLANG_LLVM_FLAVOR=USE_SYSTEM_LLVM \
          -DLLVM_DIR=/tmp/llvm-install/lib/cmake/llvm \
          -DClang_DIR=/tmp/llvm-install/lib/cmake/clang \
          -DCMAKE_PREFIX_PATH=/tmp/llvm-install

        echo "=== Building Slang ${SLANG_VERSION} runtime libraries ==="
        env LD_LIBRARY_PATH="/tmp/slang-build/external/miniz:/tmp/slang-build/external/miniz/Release:/tmp/slang-build/Release/lib:${LD_LIBRARY_PATH:-}" \
          cmake --build /tmp/slang-build --parallel "$(nproc)" --verbose

        echo "=== Installing Slang ${SLANG_VERSION} runtime libraries ==="
        cmake -DSLANG_EP_BINARY_DIR=/tmp/slang-build -P /project/cmake/slang_ep_install.cmake

        echo "=== Collecting built Slang package ==="
        /opt/python/cp311-cp311/bin/python - <<'PY'
        import pathlib
        import shutil
        import sys

        roots = [
            pathlib.Path("/tmp/slang-install"),
            pathlib.Path("/tmp/slang-build"),
        ]
        dst = pathlib.Path("/project/slang-package/lib")
        include_root = pathlib.Path("/tmp/slang-install/include")
        include_dst = pathlib.Path("/project/slang-package/include")
        dst.mkdir(parents=True, exist_ok=True)
        include_dst.mkdir(parents=True, exist_ok=True)

        copied = []
        seen = set()
        for root in roots:
            if not root.exists():
                continue
            for pattern in ("libslang*.so*", "libglslang.so*", "libSPIRV.so*"):
                for lib in sorted(root.rglob(pattern)):
                    if not lib.is_file():
                        continue
                    if lib.name.endswith(".dwarf"):
                        continue
                    target = dst / lib.name
                    if target.name in seen:
                        continue
                    shutil.copy2(lib, target)
                    seen.add(target.name)
                    copied.append(target.name)

        if not include_root.exists():
            print(f"Slang include directory was not found: {include_root}", file=sys.stderr)
            raise SystemExit(1)
        shutil.copytree(include_root, include_dst, dirs_exist_ok=True)
        if not any(p.is_file() for p in include_dst.rglob("*")):
            print(f"Slang include directory is empty: {include_dst}", file=sys.stderr)
            raise SystemExit(1)

        if not any(name.startswith("libslang-llvm") for name in copied):
            print("libslang-llvm was not found in built Slang libraries", file=sys.stderr)
            raise SystemExit(1)
        has_slang_glslang = any(name.startswith("libslang-glslang") for name in copied)
        if has_slang_glslang:
            if not any(name.startswith("libglslang.so") for name in copied):
                print("libslang-glslang is present but libglslang.so* is missing", file=sys.stderr)
                raise SystemExit(1)
            if not any(name.startswith("libSPIRV.so") for name in copied):
                print("libslang-glslang is present but libSPIRV.so* is missing", file=sys.stderr)
                raise SystemExit(1)

        print("Built Slang libraries:")
        for name in copied:
            print(f" - {name}")
        PY
        BASH

    - uses: actions/upload-artifact@v4
      with:
        name: slang-libs-ubuntu-latest-x86_64
        path: slang-package
        if-no-files-found: error

  publish_slang_image:
    name: Publish Slang Runtime Image (if missing)
    needs: [build_slang_libraries, resolve_slang_version, lookup_slang_image]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.lookup_slang_image.outputs.exists != 'true' && !cancelled() && !failure() }}
    permissions:
      contents: read
      packages: write
      actions: read
    uses: ./.github/workflows/build-slang-package-image.yml
    with:
      image_name: ${{ needs.resolve_slang_version.outputs.image_name }}
      libs_artifact: slang-libs-ubuntu-latest-x86_64
      image_tag: ${{ needs.resolve_slang_version.outputs.image_tag }}
    secrets: inherit

  build_linux_x86_wheel:
    name: Build (ubuntu-latest x86_64 ${{ matrix.manylinux_tag }})
    runs-on: ubuntu-latest
    needs: [validate_version, resolve_slang_version, lookup_slang_image, publish_slang_image]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - manylinux_tag: manylinux_2_28_x86_64
            manylinux_image: quay.io/pypa/manylinux_2_28_x86_64:latest
            slang_build_from_source: true
            slang_manage_image: true
          - manylinux_tag: manylinux_2_34_x86_64
            manylinux_image: quay.io/pypa/manylinux_2_34_x86_64:latest
            slang_build_from_source: false
            slang_manage_image: false
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      shell: bash
      run: |
        sed -i.bak 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        rm -f pymodule/pyproject.toml.bak
        grep "name =" pymodule/pyproject.toml

    - name: Report Slang image resolution
      if: ${{ (matrix.slang_manage_image || inputs.manage_slang_image) && (matrix.slang_build_from_source || inputs.linux_x86_build_slang_from_source) }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Slang version: ${{ needs.resolve_slang_version.outputs.slang_version }}"
        echo "Slang image tag: ${{ needs.resolve_slang_version.outputs.image_tag }}"
        echo "Slang image ref: ${{ needs.lookup_slang_image.outputs.image_ref }}"
        echo "Lookup result: ${{ needs.lookup_slang_image.outputs.exists }}"
        echo "Publish result: ${{ needs.publish_slang_image.result }}"

    - name: Reuse Slang image package
      if: ${{ (matrix.slang_manage_image || inputs.manage_slang_image) && (matrix.slang_build_from_source || inputs.linux_x86_build_slang_from_source) && (needs.lookup_slang_image.outputs.exists == 'true' || needs.publish_slang_image.result == 'success') }}
      shell: bash
      env:
        GHCR_USER: ${{ secrets.GHCR_PUSH_USERNAME }}
        GHCR_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
      run: |
        set -euo pipefail
        IMAGE_REF="${{ needs.lookup_slang_image.outputs.image_ref }}"
        LOCAL_ROOT_DIR="${GITHUB_WORKSPACE}/.ci/slang-image"
        LOCAL_LIB_DIR="${LOCAL_ROOT_DIR}/lib"
        LOCAL_INCLUDE_DIR="${LOCAL_ROOT_DIR}/include"
        echo "NANOVDB_SLANG_IMAGE_ROOT_DIR=" >> "$GITHUB_ENV"
        echo "NANOVDB_SLANG_IMAGE_LIB_DIR=" >> "$GITHUB_ENV"
        if [[ -n "${GHCR_TOKEN:-}" && -n "${GHCR_USER:-}" ]]; then
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin >/dev/null 2>&1
        else
          echo "GHCR credentials not available for image pull; attempting anonymous pull"
        fi
        docker pull "${IMAGE_REF}"
        rm -rf "${LOCAL_ROOT_DIR}"
        mkdir -p "${LOCAL_LIB_DIR}" "${LOCAL_INCLUDE_DIR}"

        cid=""
        cleanup() {
          if [[ -n "${cid}" ]]; then
            docker rm "${cid}" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT

        cid="$(docker create "${IMAGE_REF}" /bin/true)"
        docker cp "${cid}:/opt/slang/lib/." "${LOCAL_LIB_DIR}/"
        docker cp "${cid}:/opt/slang/include/." "${LOCAL_INCLUDE_DIR}/"
        rm -f "${LOCAL_LIB_DIR}"/*.dwarf

        if ls "${LOCAL_LIB_DIR}"/libslang*.so* >/dev/null 2>&1 && find "${LOCAL_INCLUDE_DIR}" -type f | read -r _; then
          CONTAINER_ROOT_DIR="/project${LOCAL_ROOT_DIR#${GITHUB_WORKSPACE}}"
          CONTAINER_LIB_DIR="/project${LOCAL_LIB_DIR#${GITHUB_WORKSPACE}}"
          echo "NANOVDB_SLANG_IMAGE_ROOT_DIR=${CONTAINER_ROOT_DIR}" >> "$GITHUB_ENV"
          echo "NANOVDB_SLANG_IMAGE_LIB_DIR=${CONTAINER_LIB_DIR}" >> "$GITHUB_ENV"
          echo "Reusing Slang package from cached image via ${LOCAL_ROOT_DIR}"
        else
          echo "Cached image extracted but required Slang package files were not found" >&2
          exit 1
        fi

    - name: Build Linux x86_64 wheel
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_BUILD: cp311-manylinux_x86_64
        CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
        CIBW_BUILD_VERBOSITY: 1
        CIBW_TEST_SKIP: cp311-manylinux_x86_64
        CIBW_ENVIRONMENT_PASS_LINUX: NANOVDB_SLANG_IMAGE_ROOT_DIR NANOVDB_SLANG_IMAGE_LIB_DIR
        NANOVDB_MANYLINUX_X86_64_TAG: ${{ matrix.manylinux_tag }}
        CIBW_BEFORE_ALL_LINUX: |
          if command -v dnf &> /dev/null; then
            dnf install -y cmake git
            dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
            dnf install -y miniz miniz-devel
          else
            yum install -y cmake git
            yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
            yum install -y miniz miniz-devel
          fi
          cmake --version
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
          set -e
          AW_PYTHON=""
          AW_MODE=""
          AW_VENV="/tmp/nanovdb-auditwheel-venv"
          rm -rf "${AW_VENV}"
          if python -m venv "${AW_VENV}" >/dev/null 2>&1; then
            if "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir --upgrade pip >/dev/null 2>&1 && \
               "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir "auditwheel==6.6.0" "pyelftools==0.31" >/dev/null 2>&1; then
              AW_PYTHON="${AW_VENV}/bin/python"
              AW_MODE="python-module"
            else
              echo "Warning: failed to prepare isolated auditwheel environment, falling back to system python"
            fi
          else
            echo "Warning: python -m venv unavailable, falling back to system python"
          fi
          if [ -z "${AW_MODE}" ] && python -m auditwheel --version >/dev/null 2>&1; then
            AW_PYTHON="python"
            AW_MODE="python-module"
          fi
          if [ -z "${AW_MODE}" ] && command -v auditwheel >/dev/null 2>&1; then
            AW_MODE="binary"
          fi
          if [ -z "${AW_MODE}" ]; then
            echo "ERROR: no usable auditwheel runner found (venv/python module/binary)" >&2
            python -m pip --version || true
            python --version || true
            exit 1
          fi
          run_auditwheel() {
            if [ "${AW_MODE}" = "python-module" ]; then
              "${AW_PYTHON}" - "$@" <<'PY'
          import sys

          from auditwheel import main as auditwheel_main
          import auditwheel.elfutils as auditwheel_elfutils
          import auditwheel.wheel_abi as auditwheel_wheel_abi

          _orig_elf_find_versioned_symbols = auditwheel_elfutils.elf_find_versioned_symbols
          _orig_elf_is_python_extension = auditwheel_elfutils.elf_is_python_extension
          _orig_elf_find_ucs2_symbols = auditwheel_elfutils.elf_find_ucs2_symbols
          _orig_elf_references_pyfpe_jbuf = auditwheel_elfutils.elf_references_pyfpe_jbuf

          def _patched_elf_find_versioned_symbols(elf):
              section = elf.get_section_by_name(".gnu.version_r")
              if section is not None and not hasattr(section, "iter_versions"):
                  sh_type = None
                  try:
                      sh_type = section["sh_type"]
                  except Exception:
                      sh_type = "<unknown>"
                  print(
                      f"Warning: skipping unparsable .gnu.version_r section (type={sh_type})",
                      file=sys.stderr,
                  )
                  return iter(())
              return _orig_elf_find_versioned_symbols(elf)

          def _patched_elf_is_python_extension(fn, elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  sh_type = None
                  try:
                      sh_type = section["sh_type"]
                  except Exception:
                      sh_type = "<unknown>"
                  print(
                      f"Warning: skipping unparsable .dynsym section in {fn} (type={sh_type})",
                      file=sys.stderr,
                  )
                  return False, None
              return _orig_elf_is_python_extension(fn, elf)

          def _patched_elf_find_ucs2_symbols(elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  return iter(())
              return _orig_elf_find_ucs2_symbols(elf)

          def _patched_elf_references_pyfpe_jbuf(elf):
              section = elf.get_section_by_name(".dynsym")
              if section is not None and not hasattr(section, "iter_symbols"):
                  return False
              return _orig_elf_references_pyfpe_jbuf(elf)

          auditwheel_elfutils.elf_find_versioned_symbols = _patched_elf_find_versioned_symbols
          auditwheel_elfutils.elf_is_python_extension = _patched_elf_is_python_extension
          auditwheel_elfutils.elf_find_ucs2_symbols = _patched_elf_find_ucs2_symbols
          auditwheel_elfutils.elf_references_pyfpe_jbuf = _patched_elf_references_pyfpe_jbuf
          auditwheel_wheel_abi.elf_find_versioned_symbols = _patched_elf_find_versioned_symbols
          auditwheel_wheel_abi.elf_is_python_extension = _patched_elf_is_python_extension
          auditwheel_wheel_abi.elf_find_ucs2_symbols = _patched_elf_find_ucs2_symbols
          auditwheel_wheel_abi.elf_references_pyfpe_jbuf = _patched_elf_references_pyfpe_jbuf

          sys.argv = ["auditwheel", *sys.argv[1:]]
          raise SystemExit(auditwheel_main.main())
          PY
            else
              auditwheel "$@"
            fi
          }
          echo "Using auditwheel mode: ${AW_MODE}${AW_PYTHON:+ (${AW_PYTHON})}"
          run_auditwheel --version
          SLANG_LIB_DIR="${NANOVDB_SLANG_IMAGE_LIB_DIR:-}"
          if [ -n "${SLANG_LIB_DIR}" ] && [ ! -d "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR=""
          fi
          if [ -z "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR="$(ls -d /tmp/cpm-cache/slang/*/lib 2>/dev/null | head -n1 || true)"
          fi
          SPIRV_LIB_PATH="$(python - <<'PY'
          import os
          targets = ("libSPIRV.so.15", "libSPIRV.so")
          roots = ("/project", "/tmp/cpm-cache", "/tmp")
          for root in roots:
              if not os.path.isdir(root):
                  continue
              for dirpath, _, filenames in os.walk(root):
                  for t in targets:
                      if t in filenames:
                          print(os.path.join(dirpath, t))
                          raise SystemExit(0)
          print("")
          PY
          )"
          if [ -n "${SLANG_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${SLANG_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using Slang runtime libs from ${SLANG_LIB_DIR}"
          fi
          if [ -n "${SPIRV_LIB_PATH}" ]; then
            SPIRV_LIB_DIR="$(dirname "${SPIRV_LIB_PATH}")"
            export LD_LIBRARY_PATH="${SPIRV_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using SPIRV runtime libs from ${SPIRV_LIB_DIR}"
            if [ ! -e "${SPIRV_LIB_DIR}/libSPIRV.so.15" ]; then
              SPIRV_COMPAT_DIR="/tmp/nanovdb-spirv-compat"
              mkdir -p "${SPIRV_COMPAT_DIR}"
              SPIRV_SRC_LIB=""
              if [ -e "${SPIRV_LIB_DIR}/libSPIRV.so" ]; then
                SPIRV_SRC_LIB="${SPIRV_LIB_DIR}/libSPIRV.so"
              else
                SPIRV_SRC_LIB="$(printf '%s\n' "${SPIRV_LIB_DIR}"/libSPIRV.so.15.* 2>/dev/null | head -n1 || true)"
              fi
              if [ -n "${SPIRV_SRC_LIB}" ] && [ -e "${SPIRV_SRC_LIB}" ]; then
                cp -f "${SPIRV_SRC_LIB}" "${SPIRV_COMPAT_DIR}/libSPIRV.so.15"
                export LD_LIBRARY_PATH="${SPIRV_COMPAT_DIR}:${LD_LIBRARY_PATH:-}"
                echo "Created compatibility copy: ${SPIRV_COMPAT_DIR}/libSPIRV.so.15 from ${SPIRV_SRC_LIB}"
              else
                echo "Warning: could not create SPIRV compatibility libSPIRV.so.15; source library not found in ${SPIRV_LIB_DIR}"
              fi
            fi
          else
            echo "Warning: could not locate libSPIRV.so* before auditwheel; relying on wheel-installed runtime libs"
          fi
          echo "=== auditwheel show ==="
          AUDITWHEEL_SHOW_FILE="/tmp/nanovdb-auditwheel-show.txt"
          rm -f "${AUDITWHEEL_SHOW_FILE}"
          run_auditwheel show {wheel} 2>&1 | tee "${AUDITWHEEL_SHOW_FILE}" || true
          AUDITWHEEL_DEFAULT_PLAT="${NANOVDB_MANYLINUX_X86_64_TAG}"
          AUDITWHEEL_PLAT="$(python - <<'PY' "${AUDITWHEEL_SHOW_FILE}" "${AUDITWHEEL_DEFAULT_PLAT}"
          import pathlib
          import re
          import sys

          show_path = pathlib.Path(sys.argv[1])
          default_plat = sys.argv[2]
          text = show_path.read_text(encoding="utf-8") if show_path.exists() else ""
          match = re.search(r'This constrains the platform tag to "([^"]+)"', text)
          print(match.group(1) if match else default_plat)
          PY
          )"
          echo "Using auditwheel platform from show output: ${AUDITWHEEL_PLAT}"
          run_auditwheel repair -w {dest_dir} {wheel} --lib-sdir .libs --plat "${AUDITWHEEL_PLAT}"
        CIBW_TEST_REQUIRES: numpy
        CIBW_TEST_COMMAND: python -c "import nanovdb_editor; print('Import successful')"
        CIBW_ENVIRONMENT: ${{ ((matrix.slang_build_from_source || inputs.linux_x86_build_slang_from_source) && (matrix.slang_manage_image || inputs.manage_slang_image) && (needs.lookup_slang_image.outputs.exists == 'true' || needs.publish_slang_image.result == 'success')) && 'CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=OFF -DNANOVDB_SLANG_IMAGE_ROOT_DIR=${NANOVDB_SLANG_IMAGE_ROOT_DIR} -DFETCHCONTENT_QUIET=OFF" CPM_SOURCE_CACHE=/tmp/cpm-cache' || (matrix.slang_build_from_source || inputs.linux_x86_build_slang_from_source) && 'CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=ON -DFETCHCONTENT_QUIET=OFF" CPM_SOURCE_CACHE=/tmp/cpm-cache' || 'CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=OFF -DFETCHCONTENT_QUIET=OFF" CPM_SOURCE_CACHE=/tmp/cpm-cache' }}
      with:
        package-dir: pymodule

    # - name: Verify libslang-llvm is present in Linux x86_64 wheel
    #   shell: bash
    #   run: |
    #     set -euo pipefail
    #     python - <<'PY'
    #     import pathlib
    #     import zipfile
    #     import sys

    #     wheels = sorted(pathlib.Path("wheelhouse").glob("nanovdb_editor*.whl"))
    #     if not wheels:
