name: Build Wheels

on:
  workflow_call:
    inputs:
      is_dev:
        description: 'Whether to build as dev package (nanovdb-editor-dev) with -dev version suffix'
        required: true
        type: boolean
      manage_slang_image:
        description: 'Whether to check/publish Slang GHCR image from Linux x86_64 wheels'
        required: false
        type: boolean
        default: false
    outputs:
      version_valid:
        description: 'Whether version validation passed'
        value: ${{ jobs.validate_version.outputs.version_valid }}
  workflow_dispatch:
    inputs:
      is_dev:
        description: 'Build as dev package (nanovdb-editor-dev)'
        required: false
        type: boolean
        default: false
      manage_slang_image:
        description: 'Check/publish Slang GHCR image from Linux x86_64 wheels'
        required: false
        type: boolean
        default: false

jobs:
  validate_version:
    name: Validate tag version matches VERSION.txt
    runs-on: ubuntu-latest
    outputs:
      version_valid: ${{ steps.validate.outputs.version-valid || 'true' }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Validate version
      id: validate
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: ./.github/actions/validate-version
      with:
        allow-dev-suffix: ${{ inputs.is_dev }}

  resolve_slang_version:
    name: Resolve Slang Version
    runs-on: ubuntu-latest
    outputs:
      slang_version: ${{ steps.resolve.outputs.slang_version || steps.resolve_disabled.outputs.slang_version }}
      image_name: ${{ steps.resolve.outputs.image_name || steps.resolve_disabled.outputs.image_name }}
    steps:
    - uses: actions/checkout@v4
      if: inputs.manage_slang_image

    - name: Parse Slang version from CMake config
      id: resolve
      if: inputs.manage_slang_image
      run: |
        set -euo pipefail
        slang_version="$(python - <<'PY'
        import pathlib
        import re
        import sys

        text = pathlib.Path("cmake/packages.cmake").read_text(encoding="utf-8")
        match = re.search(r"set\s*\(\s*SLANG_VERSION\s+([0-9A-Za-z._-]+)\s*\)", text)
        if not match:
            print("Could not resolve SLANG_VERSION from cmake/packages.cmake", file=sys.stderr)
            raise SystemExit(1)
        print(match.group(1))
        PY
        )"
        echo "slang_version=${slang_version}" >> "$GITHUB_OUTPUT"
        echo "image_name=nanovdb-slang" >> "$GITHUB_OUTPUT"
        echo "Resolved Slang version: ${slang_version}"

    - name: Skip Slang version resolution
      id: resolve_disabled
      if: ${{ !inputs.manage_slang_image }}
      run: |
        set -euo pipefail
        echo "slang_version=" >> "$GITHUB_OUTPUT"
        echo "image_name=nanovdb-slang" >> "$GITHUB_OUTPUT"
        echo "Slang image management disabled for this run"

  lookup_slang_image:
    name: Check Slang Image Exists
    needs: resolve_slang_version
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.lookup.outputs.exists || steps.lookup_disabled.outputs.exists }}
      image_ref: ${{ steps.lookup.outputs.image_ref || steps.lookup_disabled.outputs.image_ref }}
    env:
      IMAGE_NAME: ${{ needs.resolve_slang_version.outputs.image_name }}
      SLANG_VERSION: ${{ needs.resolve_slang_version.outputs.slang_version }}
    steps:
    - name: Look up cached Slang image
      id: lookup
      if: inputs.manage_slang_image
      env:
        GHCR_USER: ${{ secrets.GHCR_PUSH_USERNAME }}
        GHCR_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
      run: |
        set -euo pipefail
        slang_tag="${SLANG_VERSION//[^0-9a-zA-Z._-]/-}"
        image_ref="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${slang_tag}"
        echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
        echo "Resolved Slang version tag: ${slang_tag}"

        # Login only when credentials are present (not available in fork PRs)
        if [[ -n "${GHCR_TOKEN:-}" && -n "${GHCR_USER:-}" ]]; then
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin >/dev/null 2>&1
        else
          echo "GHCR credentials not available (e.g. fork PR); checking image without login"
        fi

        if docker manifest inspect "${image_ref}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Found cached Slang image: ${image_ref}"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Slang image not found, build required: ${image_ref}"
        fi

    - name: Skip Slang image lookup
      id: lookup_disabled
      if: ${{ !inputs.manage_slang_image }}
      run: |
        set -euo pipefail
        echo "exists=false" >> "$GITHUB_OUTPUT"
        echo "image_ref=" >> "$GITHUB_OUTPUT"
        echo "Slang image management disabled for this run"

  build_wheels:
    name: Build (${{ matrix.os }}${{ matrix.arch && format(' {0}', matrix.arch) || '' }})
    runs-on: ${{ matrix.os }}
    needs: [validate_version, resolve_slang_version, lookup_slang_image]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: ARM64
            cibw_build: "cp311-manylinux_aarch64"
            cibw_environment: >
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=/tmp/cpm-cache
          - os: windows-latest
            arch: ""
            cibw_build: "cp311-win_amd64"
            cibw_environment: >
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=/tmp/cpm-cache
          - os: windows-11-arm
            arch: ARM64
            cibw_build: "cp311-win_arm64"
            cibw_environment: >
              CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DFETCHCONTENT_QUIET=OFF"
              CPM_SOURCE_CACHE=/tmp/cpm-cache

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python (ARM64)
      if: matrix.os == 'windows-11-arm'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: arm64

    - name: Set up Python
      if: matrix.os != 'windows-11-arm'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      shell: bash
      run: |
        sed -i 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        cat pymodule/pyproject.toml | grep "name ="

    - name: Report Slang cache resolution (linux x86_64)
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86_64' && inputs.manage_slang_image
      shell: bash
      run: |
        set -euo pipefail
        echo "Slang version: ${{ needs.resolve_slang_version.outputs.slang_version }}"
        echo "Slang image ref: ${{ needs.lookup_slang_image.outputs.image_ref }}"
        echo "Slang image exists: ${{ needs.lookup_slang_image.outputs.exists }}"

    - name: Reuse cached Slang image libraries (linux x86_64)
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86_64' && inputs.manage_slang_image && needs.lookup_slang_image.outputs.exists == 'true'
      shell: bash
      run: |
        set -euo pipefail
        IMAGE_REF="${{ needs.lookup_slang_image.outputs.image_ref }}"
        LOCAL_LIB_DIR="${GITHUB_WORKSPACE}/.ci/slang-image-lib"
        echo "NANOVDB_SLANG_IMAGE_LIB_DIR=" >> "$GITHUB_ENV"
        if ! docker pull "${IMAGE_REF}"; then
          echo "Failed to pull cached Slang image; building as usual"
          exit 0
        fi
        rm -rf "${LOCAL_LIB_DIR}"
        mkdir -p "${LOCAL_LIB_DIR}"

        cid=""
        cleanup() {
          if [[ -n "${cid}" ]]; then
            docker rm "${cid}" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT

        if ! cid="$(docker create "${IMAGE_REF}" /bin/true)"; then
          echo "Failed to create extraction container from cached image; building as usual"
          exit 0
        fi
        if ! docker cp "${cid}:/opt/slang/lib/." "${LOCAL_LIB_DIR}/"; then
          echo "Failed to copy Slang libs from cached image; building as usual"
          exit 0
        fi

        if ls "${LOCAL_LIB_DIR}"/libslang*.so* >/dev/null 2>&1; then
          CONTAINER_LIB_DIR="/project${LOCAL_LIB_DIR#${GITHUB_WORKSPACE}}"
          echo "NANOVDB_SLANG_IMAGE_LIB_DIR=${CONTAINER_LIB_DIR}" >> "$GITHUB_ENV"
          echo "Reusing Slang libs from cached image via ${LOCAL_LIB_DIR}"
        else
          echo "Cached image extracted but no libslang*.so* found; falling back to build outputs"
        fi

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_BUILD: ${{ matrix.cibw_build }}
        CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_34_x86_64:latest
        CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_34_aarch64:latest
        CIBW_BUILD_VERBOSITY: 1
        CIBW_ARCHS: ${{ matrix.os == 'ubuntu-24.04-arm' && 'aarch64' || 'auto' }}
        CIBW_ARCHS_WINDOWS: ${{ matrix.os == 'windows-11-arm' && 'ARM64' || 'auto' }}
        CIBW_ENVIRONMENT_PASS_LINUX: NANOVDB_SLANG_IMAGE_LIB_DIR

        # Linux dependencies
        CIBW_BEFORE_ALL_LINUX: |
          if command -v dnf &> /dev/null; then
            dnf install -y cmake git
            dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
            dnf install -y miniz miniz-devel
          else
            yum install -y cmake git
            yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
            yum install -y miniz miniz-devel
          fi
          cmake --version

        # Windows dependencies
        CIBW_BEFORE_ALL_WINDOWS: |
          python -m pip install cmake
          cmake --version

        CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
          set -e
          # Prefer an isolated auditwheel toolchain to avoid mismatches with
          # preinstalled pipx/system packages. Fall back to system python.
          AW_PYTHON=""
          AW_MODE=""
          AW_VENV="/tmp/nanovdb-auditwheel-venv"
          rm -rf "${AW_VENV}"
          if python -m venv "${AW_VENV}" >/dev/null 2>&1; then
            if "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir --upgrade pip >/dev/null 2>&1 && \
               "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir "auditwheel>=6.0.0" "pyelftools>=0.30" >/dev/null 2>&1; then
              AW_PYTHON="${AW_VENV}/bin/python"
              AW_MODE="python-module"
            else
              echo "Warning: failed to prepare isolated auditwheel environment, falling back to system python"
            fi
          else
            echo "Warning: python -m venv unavailable, falling back to system python"
          fi
          if [ -z "${AW_MODE}" ] && python -m auditwheel --version >/dev/null 2>&1; then
            AW_PYTHON="python"
            AW_MODE="python-module"
          fi
          if [ -z "${AW_MODE}" ] && command -v auditwheel >/dev/null 2>&1; then
            AW_MODE="binary"
          fi
          if [ -z "${AW_MODE}" ]; then
            echo "ERROR: no usable auditwheel runner found (venv/python module/binary)" >&2
            python -m pip --version || true
            python --version || true
            exit 1
          fi
          run_auditwheel() {
            if [ "${AW_MODE}" = "python-module" ]; then
              "${AW_PYTHON}" -m auditwheel "$@"
            else
              auditwheel "$@"
            fi
          }
          echo "Using auditwheel mode: ${AW_MODE}${AW_PYTHON:+ (${AW_PYTHON})}"
          run_auditwheel --version
          SLANG_LIB_DIR="${NANOVDB_SLANG_IMAGE_LIB_DIR:-}"
          if [ -n "${SLANG_LIB_DIR}" ] && [ ! -d "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR=""
          fi
          if [ -z "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR="$(ls -d /tmp/cpm-cache/slang/*/lib 2>/dev/null | head -n1 || true)"
          fi
          SPIRV_LIB_PATH="$(python - <<'PY'
          import os
          targets = ("libSPIRV.so.15", "libSPIRV.so")
          roots = ("/project", "/tmp/cpm-cache", "/tmp")
          for root in roots:
              if not os.path.isdir(root):
                  continue
              for dirpath, _, filenames in os.walk(root):
                  for t in targets:
                      if t in filenames:
                          print(os.path.join(dirpath, t))
                          raise SystemExit(0)
          print("")
          PY
          )"
          if [ -n "${SLANG_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${SLANG_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using Slang runtime libs from ${SLANG_LIB_DIR}"
          fi
          if [ -n "${SPIRV_LIB_PATH}" ]; then
            SPIRV_LIB_DIR="$(dirname "${SPIRV_LIB_PATH}")"
            export LD_LIBRARY_PATH="${SPIRV_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using SPIRV runtime libs from ${SPIRV_LIB_DIR}"
            if [ ! -e "${SPIRV_LIB_DIR}/libSPIRV.so.15" ]; then
              SPIRV_COMPAT_DIR="/tmp/nanovdb-spirv-compat"
              mkdir -p "${SPIRV_COMPAT_DIR}"
              SPIRV_SRC_LIB=""
              if [ -e "${SPIRV_LIB_DIR}/libSPIRV.so" ]; then
                SPIRV_SRC_LIB="${SPIRV_LIB_DIR}/libSPIRV.so"
              else
                SPIRV_SRC_LIB="$(printf '%s\n' "${SPIRV_LIB_DIR}"/libSPIRV.so.15.* 2>/dev/null | head -n1 || true)"
              fi
              if [ -n "${SPIRV_SRC_LIB}" ] && [ -e "${SPIRV_SRC_LIB}" ]; then
                cp -f "${SPIRV_SRC_LIB}" "${SPIRV_COMPAT_DIR}/libSPIRV.so.15"
                export LD_LIBRARY_PATH="${SPIRV_COMPAT_DIR}:${LD_LIBRARY_PATH:-}"
                echo "Created compatibility copy: ${SPIRV_COMPAT_DIR}/libSPIRV.so.15 from ${SPIRV_SRC_LIB}"
              else
                echo "Warning: could not create SPIRV compatibility libSPIRV.so.15; source library not found in ${SPIRV_LIB_DIR}"
              fi
            fi
          else
            echo "Warning: could not locate libSPIRV.so* before auditwheel; relying on wheel-installed runtime libs"
          fi
          case "{wheel}" in
            *aarch64*)
              run_auditwheel repair -w {dest_dir} {wheel} --lib-sdir .libs --plat manylinux_2_34_aarch64
              ;;
            *)
              run_auditwheel repair -w {dest_dir} {wheel} --lib-sdir .libs --plat manylinux_2_34_x86_64
              ;;
          esac

        # Install test dependencies before testing
        CIBW_TEST_REQUIRES: numpy

        # Test the wheels
        CIBW_TEST_COMMAND: python -c "import nanovdb_editor; print('Import successful')"

        # Mark this as a PyPI build, disable gtests for published wheels
        # Add retry and timeout settings for CMake downloads
        CIBW_ENVIRONMENT: ${{ matrix.cibw_environment }}
      with:
        package-dir: pymodule

    - name: Verify libslang-llvm is present in Linux x86_64 wheel
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86_64' && inputs.manage_slang_image
      shell: bash
      run: |
        set -euo pipefail
        python - <<'PY'
        import pathlib
        import zipfile
        import sys

        wheels = sorted(pathlib.Path("wheelhouse").glob("nanovdb_editor*.whl"))
        if not wheels:
            print("No nanovdb_editor wheel found in wheelhouse/", file=sys.stderr)
            raise SystemExit(1)

        wheel = wheels[0]
        print(f"Inspecting wheel: {wheel}")
        with zipfile.ZipFile(wheel) as zf:
            names = zf.namelist()
        llvm_hits = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang-llvm" in n]
        if not llvm_hits:
            slang_libs = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang" in n]
            print("libslang-llvm was not found in wheel; available Slang libs:", file=sys.stderr)
            for name in slang_libs:
                print(f" - {name}", file=sys.stderr)
            raise SystemExit(1)
        print("Found libslang-llvm entries:")
        for name in llvm_hits:
            print(f" - {name}")
        PY

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
        path: ./wheelhouse/*.whl

  build_slang_libraries:
    name: Build Slang Runtime Libs
    runs-on: ubuntu-latest
    needs: [validate_version, resolve_slang_version, lookup_slang_image]
    if: ${{ inputs.manage_slang_image && !cancelled() && !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.lookup_slang_image.outputs.exists != 'true' }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Slang libs in manylinux environment
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p slang-package/lib
        rm -f slang-package/lib/*

        docker run --rm -i \
          -v "${GITHUB_WORKSPACE}:/project" \
          -w /project \
          quay.io/pypa/manylinux_2_34_x86_64:latest \
          /bin/bash -s <<'BASH'
        set -euo pipefail
        export CPM_SOURCE_CACHE=/tmp/cpm-cache
        echo "=== Installing manylinux build dependencies ==="
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y cmake ninja-build git
          dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
          dnf install -y miniz miniz-devel
        else
          yum install -y cmake ninja-build git
          yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
          yum install -y miniz miniz-devel
        fi
        echo "=== Configuring Slang runtime build ==="
        cmake --version
        cmake -S /project -B /tmp/nvdb-slang-build -GNinja \
          -DSKBUILD=ON \
          -DNANOVDB_EDITOR_PYPI_BUILD=ON \
          -DNANOVDB_EDITOR_BUILD_TESTS=OFF \
          -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=ON \
          -DFETCHCONTENT_QUIET=OFF
        echo "=== Building LLVM and Slang runtime libraries ==="
        cmake --build /tmp/nvdb-slang-build --target slang_src_build --config Release --verbose
        echo "=== Collecting built Slang runtime libraries ==="
        /opt/python/cp311-cp311/bin/python - <<'PY'
        import pathlib
        import shutil
        import sys

        roots = [
            pathlib.Path("/tmp/nvdb-slang-build/slang-install"),
            pathlib.Path("/tmp/nvdb-slang-build/slang_src_build-prefix/src/slang_src_build-build"),
        ]
        dst = pathlib.Path("/project/slang-package/lib")
        dst.mkdir(parents=True, exist_ok=True)

        copied = []
        seen = set()
        for root in roots:
            if not root.exists():
                continue
            for pattern in ("libslang*.so*", "libglslang.so*", "libSPIRV.so*"):
                for lib in sorted(root.rglob(pattern)):
                    if not lib.is_file():
                        continue
                    target = dst / lib.name
                    if target.name in seen:
                        continue
                    shutil.copy2(lib, target)
                    seen.add(target.name)
                    copied.append(target.name)

        if not any(name.startswith("libslang-llvm") for name in copied):
            print("libslang-llvm was not found in built Slang libraries", file=sys.stderr)
            raise SystemExit(1)
        has_slang_glslang = any(name.startswith("libslang-glslang") for name in copied)
        if has_slang_glslang:
            if not any(name.startswith("libglslang.so") for name in copied):
                print("libslang-glslang is present but libglslang.so* is missing", file=sys.stderr)
                raise SystemExit(1)
            if not any(name.startswith("libSPIRV.so") for name in copied):
                print("libslang-glslang is present but libSPIRV.so* is missing", file=sys.stderr)
                raise SystemExit(1)

        print("Built Slang libraries:")
        for name in copied:
            print(f" - {name}")
        PY
        BASH

    - uses: actions/upload-artifact@v4
      with:
        name: slang-libs-ubuntu-latest-x86_64
        path: slang-package/lib/*
        if-no-files-found: error

  publish_slang_image:
    name: Publish Slang Runtime Image (if missing)
    needs: [build_slang_libraries, resolve_slang_version, lookup_slang_image]
    if: ${{ inputs.manage_slang_image && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.lookup_slang_image.outputs.exists != 'true' && !cancelled() && !failure() }}
    uses: ./.github/workflows/build-slang-package-image.yml
    with:
      image_name: ${{ needs.resolve_slang_version.outputs.image_name }}
      libs_artifact: slang-libs-ubuntu-latest-x86_64
      image_tag: ${{ needs.resolve_slang_version.outputs.slang_version }}
    secrets: inherit

  build_linux_x86_wheel:
    name: Build (ubuntu-latest x86_64)
    runs-on: ubuntu-latest
    needs: [validate_version, resolve_slang_version, lookup_slang_image, publish_slang_image]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') && (!inputs.manage_slang_image || needs.lookup_slang_image.outputs.exists == 'true' || needs.publish_slang_image.result == 'success') }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      shell: bash
      run: |
        sed -i 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        cat pymodule/pyproject.toml | grep "name ="

    - name: Report Slang image resolution
      if: inputs.manage_slang_image
      shell: bash
      run: |
        set -euo pipefail
        echo "Slang version: ${{ needs.resolve_slang_version.outputs.slang_version }}"
        echo "Slang image ref: ${{ needs.lookup_slang_image.outputs.image_ref }}"
        echo "Lookup result: ${{ needs.lookup_slang_image.outputs.exists }}"
        echo "Publish result: ${{ needs.publish_slang_image.result }}"

    - name: Reuse Slang image libraries
      if: inputs.manage_slang_image
      shell: bash
      run: |
        set -euo pipefail
        IMAGE_REF="${{ needs.lookup_slang_image.outputs.image_ref }}"
        LOCAL_LIB_DIR="${GITHUB_WORKSPACE}/.ci/slang-image-lib"
        echo "NANOVDB_SLANG_IMAGE_LIB_DIR=" >> "$GITHUB_ENV"
        docker pull "${IMAGE_REF}"
        rm -rf "${LOCAL_LIB_DIR}"
        mkdir -p "${LOCAL_LIB_DIR}"

        cid=""
        cleanup() {
          if [[ -n "${cid}" ]]; then
            docker rm "${cid}" >/dev/null 2>&1 || true
          fi
        }
        trap cleanup EXIT

        cid="$(docker create "${IMAGE_REF}" /bin/true)"
        docker cp "${cid}:/opt/slang/lib/." "${LOCAL_LIB_DIR}/"

        if ls "${LOCAL_LIB_DIR}"/libslang*.so* >/dev/null 2>&1; then
          CONTAINER_LIB_DIR="/project${LOCAL_LIB_DIR#${GITHUB_WORKSPACE}}"
          echo "NANOVDB_SLANG_IMAGE_LIB_DIR=${CONTAINER_LIB_DIR}" >> "$GITHUB_ENV"
          echo "Reusing Slang libs from cached image via ${LOCAL_LIB_DIR}"
        else
          echo "Cached image extracted but no libslang*.so* found" >&2
          exit 1
        fi

    - name: Build Linux x86_64 wheel
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_BUILD: cp311-manylinux_x86_64
        CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_34_x86_64:latest
        CIBW_BUILD_VERBOSITY: 1
        CIBW_ENVIRONMENT_PASS_LINUX: NANOVDB_SLANG_IMAGE_LIB_DIR
        CIBW_BEFORE_ALL_LINUX: |
          if command -v dnf &> /dev/null; then
            dnf install -y cmake git
            dnf install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel wayland-protocols-devel
            dnf install -y miniz miniz-devel
          else
            yum install -y cmake git
            yum install -y libXrandr-devel libxcb-devel libxkbcommon-x11-devel libXinerama-devel
            yum install -y miniz miniz-devel
          fi
          cmake --version
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
          set -e
          AW_PYTHON=""
          AW_MODE=""
          AW_VENV="/tmp/nanovdb-auditwheel-venv"
          rm -rf "${AW_VENV}"
          if python -m venv "${AW_VENV}" >/dev/null 2>&1; then
            if "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir --upgrade pip >/dev/null 2>&1 && \
               "${AW_VENV}/bin/python" -m pip install --disable-pip-version-check --no-cache-dir "auditwheel>=6.0.0" "pyelftools>=0.30" >/dev/null 2>&1; then
              AW_PYTHON="${AW_VENV}/bin/python"
              AW_MODE="python-module"
            else
              echo "Warning: failed to prepare isolated auditwheel environment, falling back to system python"
            fi
          else
            echo "Warning: python -m venv unavailable, falling back to system python"
          fi
          if [ -z "${AW_MODE}" ] && python -m auditwheel --version >/dev/null 2>&1; then
            AW_PYTHON="python"
            AW_MODE="python-module"
          fi
          if [ -z "${AW_MODE}" ] && command -v auditwheel >/dev/null 2>&1; then
            AW_MODE="binary"
          fi
          if [ -z "${AW_MODE}" ]; then
            echo "ERROR: no usable auditwheel runner found (venv/python module/binary)" >&2
            python -m pip --version || true
            python --version || true
            exit 1
          fi
          run_auditwheel() {
            if [ "${AW_MODE}" = "python-module" ]; then
              "${AW_PYTHON}" -m auditwheel "$@"
            else
              auditwheel "$@"
            fi
          }
          echo "Using auditwheel mode: ${AW_MODE}${AW_PYTHON:+ (${AW_PYTHON})}"
          run_auditwheel --version
          SLANG_LIB_DIR="${NANOVDB_SLANG_IMAGE_LIB_DIR:-}"
          if [ -n "${SLANG_LIB_DIR}" ] && [ ! -d "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR=""
          fi
          if [ -z "${SLANG_LIB_DIR}" ]; then
            SLANG_LIB_DIR="$(ls -d /tmp/cpm-cache/slang/*/lib 2>/dev/null | head -n1 || true)"
          fi
          SPIRV_LIB_PATH="$(python - <<'PY'
          import os
          targets = ("libSPIRV.so.15", "libSPIRV.so")
          roots = ("/project", "/tmp/cpm-cache", "/tmp")
          for root in roots:
              if not os.path.isdir(root):
                  continue
              for dirpath, _, filenames in os.walk(root):
                  for t in targets:
                      if t in filenames:
                          print(os.path.join(dirpath, t))
                          raise SystemExit(0)
          print("")
          PY
          )"
          if [ -n "${SLANG_LIB_DIR}" ]; then
            export LD_LIBRARY_PATH="${SLANG_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using Slang runtime libs from ${SLANG_LIB_DIR}"
          fi
          if [ -n "${SPIRV_LIB_PATH}" ]; then
            SPIRV_LIB_DIR="$(dirname "${SPIRV_LIB_PATH}")"
            export LD_LIBRARY_PATH="${SPIRV_LIB_DIR}:${LD_LIBRARY_PATH:-}"
            echo "Using SPIRV runtime libs from ${SPIRV_LIB_DIR}"
            if [ ! -e "${SPIRV_LIB_DIR}/libSPIRV.so.15" ]; then
              SPIRV_COMPAT_DIR="/tmp/nanovdb-spirv-compat"
              mkdir -p "${SPIRV_COMPAT_DIR}"
              SPIRV_SRC_LIB=""
              if [ -e "${SPIRV_LIB_DIR}/libSPIRV.so" ]; then
                SPIRV_SRC_LIB="${SPIRV_LIB_DIR}/libSPIRV.so"
              else
                SPIRV_SRC_LIB="$(printf '%s\n' "${SPIRV_LIB_DIR}"/libSPIRV.so.15.* 2>/dev/null | head -n1 || true)"
              fi
              if [ -n "${SPIRV_SRC_LIB}" ] && [ -e "${SPIRV_SRC_LIB}" ]; then
                cp -f "${SPIRV_SRC_LIB}" "${SPIRV_COMPAT_DIR}/libSPIRV.so.15"
                export LD_LIBRARY_PATH="${SPIRV_COMPAT_DIR}:${LD_LIBRARY_PATH:-}"
                echo "Created compatibility copy: ${SPIRV_COMPAT_DIR}/libSPIRV.so.15 from ${SPIRV_SRC_LIB}"
              else
                echo "Warning: could not create SPIRV compatibility libSPIRV.so.15; source library not found in ${SPIRV_LIB_DIR}"
              fi
            fi
          else
            echo "Warning: could not locate libSPIRV.so* before auditwheel; relying on wheel-installed runtime libs"
          fi
          run_auditwheel repair -w {dest_dir} {wheel} --lib-sdir .libs --plat manylinux_2_34_x86_64
        CIBW_TEST_REQUIRES: numpy
        CIBW_TEST_COMMAND: python -c "import nanovdb_editor; print('Import successful')"
        CIBW_ENVIRONMENT: ${{ inputs.manage_slang_image && 'CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=OFF -DNANOVDB_SLANG_IMAGE_LIB_DIR=${NANOVDB_SLANG_IMAGE_LIB_DIR} -DFETCHCONTENT_QUIET=OFF" CPM_SOURCE_CACHE=/tmp/cpm-cache' || 'CMAKE_ARGS="-DNANOVDB_EDITOR_PYPI_BUILD=ON -DNANOVDB_EDITOR_BUILD_TESTS=OFF -DNANOVDB_EDITOR_BUILD_SLANG_FROM_SOURCE=ON -DFETCHCONTENT_QUIET=OFF" CPM_SOURCE_CACHE=/tmp/cpm-cache' }}
      with:
        package-dir: pymodule

    - name: Verify libslang-llvm is present in Linux x86_64 wheel
      shell: bash
      run: |
        set -euo pipefail
        python - <<'PY'
        import pathlib
        import zipfile
        import sys

        wheels = sorted(pathlib.Path("wheelhouse").glob("nanovdb_editor*.whl"))
        if not wheels:
            print("No nanovdb_editor wheel found in wheelhouse/", file=sys.stderr)
            raise SystemExit(1)

        wheel = wheels[0]
        print(f"Inspecting wheel: {wheel}")
        with zipfile.ZipFile(wheel) as zf:
            names = zf.namelist()
        llvm_hits = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang-llvm" in n]
        if not llvm_hits:
            slang_libs = [n for n in names if n.startswith("nanovdb_editor/lib/") and "libslang" in n]
            print("libslang-llvm was not found in wheel; available Slang libs:", file=sys.stderr)
            for name in slang_libs:
                print(f" - {name}", file=sys.stderr)
            raise SystemExit(1)
        print("Found libslang-llvm entries:")
        for name in llvm_hits:
            print(f" - {name}")
        PY

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ubuntu-latest-x86_64
        path: ./wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [validate_version]
    if: ${{ !failure() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.validate_version.outputs.version_valid == 'true') }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Rename package for dev release
      if: inputs.is_dev
      run: |
        sed -i 's/name = "nanovdb-editor"/name = "nanovdb-editor-dev"/' pymodule/pyproject.toml
        cat pymodule/pyproject.toml | grep "name ="

    - name: Build sdist
      run: pipx run build --sdist
      working-directory: pymodule

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: pymodule/dist/*.tar.gz
