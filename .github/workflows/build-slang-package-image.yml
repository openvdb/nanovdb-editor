name: Build Slang Package Image

on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
        default: nanovdb-slang
      wheel_artifact:
        required: false
        type: string
        default: wheels-ubuntu-latest-x86_64
      image_tag:
        required: false
        type: string
        default: ""
    outputs:
      image_ref:
        description: "Fully qualified image reference pushed to GHCR"
        value: ${{ jobs.build-and-push-image.outputs.image_ref }}

jobs:
  build-and-push-image:
    name: Build and Push Slang Package Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    outputs:
      image_ref: ${{ steps.compute_ref.outputs.image_ref }}
    env:
      IMAGE_NAME: ${{ inputs.image_name }}
      WHEEL_ARTIFACT: ${{ inputs.wheel_artifact }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
    steps:
      - name: Compute image reference
        id: compute_ref
        run: |
          set -euo pipefail
          raw_tag="${IMAGE_TAG_INPUT}"
          if [[ -z "${raw_tag}" ]]; then
            raw_tag="${GITHUB_SHA}"
          fi
          safe_tag="${raw_tag//[^0-9a-zA-Z._-]/-}"
          image_ref="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${safe_tag}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "Will build and push: ${image_ref}"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEEL_ARTIFACT }}
          path: wheelhouse/

      - name: Prepare Slang package context
        run: |
          set -euo pipefail
          mkdir -p slang-package/lib

          wheel_path=$(python -c "import pathlib, sys; wheels = sorted(pathlib.Path('wheelhouse').glob('nanovdb_editor*.whl')); sys.stdout.write(str(wheels[0]) if wheels else ''); sys.exit(0 if wheels else 1)")
          if [[ -z "${wheel_path}" ]]; then
            echo "No nanovdb_editor*.whl found in wheelhouse/" >&2
            exit 1
          fi
          echo "Using wheel: ${wheel_path}"

          python - <<'PY'
          import pathlib
          import zipfile
          import shutil
          import sys

          wheel = next(iter(sorted(pathlib.Path("wheelhouse").glob("nanovdb_editor*.whl"))), None)
          if wheel is None:
              print("No wheel found", file=sys.stderr)
              raise SystemExit(1)

          extract_root = pathlib.Path("wheel-extract")
          if extract_root.exists():
              shutil.rmtree(extract_root)
          extract_root.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(wheel) as zf:
              zf.extractall(extract_root)

          src_lib_dir = extract_root / "nanovdb_editor" / "lib"
          if not src_lib_dir.exists():
              print(f"Missing expected library dir: {src_lib_dir}", file=sys.stderr)
              raise SystemExit(1)

          dst_lib_dir = pathlib.Path("slang-package") / "lib"
          copied = []
          for pattern in ("libslang*.so*", "libglslang.so*", "libSPIRV.so*"):
              for lib in sorted(src_lib_dir.glob(pattern)):
                  target = dst_lib_dir / lib.name
                  shutil.copy2(lib, target)
                  copied.append(target.name)

          if not any(name.startswith("libslang-llvm") for name in copied):
              print("libslang-llvm was not found in the wheel; refusing to publish image", file=sys.stderr)
              raise SystemExit(1)
          has_slang_glslang = any(name.startswith("libslang-glslang") for name in copied)
          if has_slang_glslang:
              if not any(name.startswith("libglslang.so") for name in copied):
                  print("libslang-glslang is present but libglslang.so* is missing; refusing to publish image", file=sys.stderr)
                  raise SystemExit(1)
              if not any(name.startswith("libSPIRV.so") for name in copied):
                  print("libslang-glslang is present but libSPIRV.so* is missing; refusing to publish image", file=sys.stderr)
                  raise SystemExit(1)
          else:
              print("libslang-glslang is not present in the wheel; skipping glslang/SPIRV validation")

          print("Copied Slang libraries:")
          for name in copied:
              print(f" - {name}")
          PY

          cat > slang-package/Dockerfile <<'EOF'
          FROM scratch
          LABEL org.opencontainers.image.title="NanoVDB Slang Runtime"
          LABEL org.opencontainers.image.description="Prebuilt Slang runtime libraries extracted from nanovdb-editor wheel artifacts"
          COPY lib/ /opt/slang/lib/
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PUSH_USERNAME }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Slang package image
        run: |
          set -euo pipefail
          IMAGE_REF="${{ steps.compute_ref.outputs.image_ref }}"
          docker buildx build \
            --platform linux/amd64 \
            -f slang-package/Dockerfile \
            -t "${IMAGE_REF}" \
            --push \
            --progress=plain \
            slang-package
