name: fVDB Viewer Integration

permissions:
  contents: read
  actions: read

on:
  # Direct workflow_dispatch validates the PUBLISHED nanovdb-editor wheel
  # (release/dev) against either the pinned fvdb-core release or the nightly
  # main branch. To test the nanovdb-editor wheel built from the CURRENT
  # BRANCH, dispatch `build-wheels.yml` with `run_fvdb_viz_integration=true`;
  # that workflow builds the manylinux wheel and forwards it here via
  # `wheel_artifact` (both release and nightly jobs run in parallel).
  workflow_dispatch:
    inputs:
      package:
        description: "Package stream to validate (published nanovdb-editor release/dev wheel)"
        required: true
        type: choice
        default: release
        options:
          - release
          - dev
      fvdb_nightly:
        description: "Install the latest fvdb-core[viewer] nightly wheel (tracks fvdb-core main; no runner compile)"
        required: false
        type: boolean
        default: false
      upstream_test_ref:
        description: "Which upstream fvdb viz test source to use"
        required: false
        type: choice
        default: main
        options:
          - main
          - release
      wheel_artifact:
        description: "Artifact name for the wheel to test (leave empty to use the published wheel)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      package:
        description: "Package stream to validate (release/dev)"
        required: false
        type: string
        default: release
      fvdb_nightly:
        description: "Install the latest fvdb-core[viewer] nightly wheel (tracks fvdb-core main)"
        required: false
        type: boolean
        default: false
      upstream_test_ref:
        description: "Which upstream fvdb viz test source to use (main/release)"
        required: false
        type: string
        default: release
      wheel_artifact:
        description: "Artifact name for the wheel to test"
        required: false
        type: string
        default: ""

jobs:
  run-integration-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FVDB_VIZ_SKIP_BASE_INSTALL: 1
      FVDB_VIZ_IMAGE_CACHE_ENABLED: 0
    steps:
      - name: Resolve package selection
        id: config
        run: |
          set -euo pipefail
          stream="${{ inputs.package }}"
          stream="${stream,,}"
          if [[ -z "$stream" ]]; then
            stream="release"
          fi
          if [[ "$stream" != "release" && "$stream" != "dev" ]]; then
            echo "Unsupported package stream: $stream" >&2
            exit 1
          fi
          use_local="false"
          if [[ "${{ inputs.wheel_artifact }}" != "" ]]; then
            use_local="true"
          fi
          {
            echo "package_stream=$stream"
            echo "use_local=$use_local"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export fvdb defaults
        run: |
          set -euo pipefail
          source scripts/fvdb_viz_versions.sh
          {
            echo "FVDB_VIZ_TORCH_VERSION=${FVDB_VIZ_TORCH_VERSION_DEFAULT}"
            echo "FVDB_VIZ_TORCH_INDEX_URL=${FVDB_VIZ_TORCH_INDEX_URL_DEFAULT}"
            echo "FVDB_VIZ_CORE_VERSION=${FVDB_VIZ_CORE_VERSION_DEFAULT}"
            echo "FVDB_VIZ_CORE_INDEX_URL=${FVDB_VIZ_CORE_INDEX_URL_DEFAULT}"
            echo "FVDB_VIZ_TEST_IMAGE_BASE=${FVDB_VIZ_TEST_IMAGE_BASE_DEFAULT}"
            echo "FVDB_VIZ_SCRIPT_TIMEOUT=${FVDB_VIZ_SCRIPT_TIMEOUT_DEFAULT}"
          } >> "$GITHUB_ENV"

      - name: Prepare wheel directory
        run: |
          rm -rf pymodule/dist
          mkdir -p pymodule/dist

      - name: Download wheel artifact
        if: ${{ inputs.wheel_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.wheel_artifact }}
          path: pymodule/dist

      - name: Locate local wheel artifact
        if: ${{ steps.config.outputs.use_local == 'true' }}
        id: local_wheel
        run: |
          set -euo pipefail
          wheel_path=$(python -c "import pathlib, sys; dist = pathlib.Path('pymodule') / 'dist'; matches = sorted(dist.glob('nanovdb_editor*.whl')); sys.stdout.write(str(matches[0]) if matches else ''); sys.exit(0 if matches else 1)")
          if [[ -z "$wheel_path" ]]; then
            echo 'No nanovdb_editor*.whl found in pymodule/dist' >&2
            exit 1
          fi
          echo "host_path=${wheel_path}" >> "$GITHUB_OUTPUT"
          echo "container_path=/workspace/${wheel_path}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/lib/jvm /opt/hostedtoolcache
          sudo apt-get clean
          sudo docker system prune --all --force --volumes || true

      - name: Run fvdb.viz tests
        run: |
          set -euo pipefail

          SCRIPT_ARGS=("--stream" "${{ steps.config.outputs.package_stream }}")

          if [[ "${{ steps.config.outputs.use_local }}" == "true" ]]; then
            SCRIPT_ARGS+=("--local-wheel" "${{ steps.local_wheel.outputs.host_path }}")
          fi

          if [[ "${{ inputs.fvdb_nightly }}" == "true" ]]; then
            SCRIPT_ARGS+=("--fvdb-nightly")
          fi

          if [[ -n "${{ inputs.upstream_test_ref }}" ]]; then
            SCRIPT_ARGS+=("--upstream-test-ref" "${{ inputs.upstream_test_ref }}")
          fi

          ./scripts/run_fvdb_viz_integration.sh "${SCRIPT_ARGS[@]}"
