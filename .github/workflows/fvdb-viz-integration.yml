name: fVDB Viewer Integration

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package stream to validate"
        required: true
        type: choice
        default: release
        options:
          - release
          - dev
      fvdb_source_ref:
        description: "Install fvdb-core[viewer] from openvdb/fvdb-core@REF when building the test image"
        required: false
        type: string
        default: ""
      upstream_test_ref:
        description: "Which upstream fvdb viz test source to use"
        required: false
        type: choice
        default: main
        options:
          - release_or_main
          - main
          - release
  workflow_call:
    inputs:
      package:
        description: "Package stream to validate (release/dev)"
        required: false
        type: string
        default: release
      fvdb_source_ref:
        description: "Install fvdb-core[viewer] from openvdb/fvdb-core@REF when building the test image"
        required: false
        type: string
        default: ""
      upstream_test_ref:
        description: "Which upstream fvdb viz test source to use (release_or_main/main/release)"
        required: false
        type: string
        default: release
      wheel_artifact:
        description: "Artifact name for the wheel to test"
        required: false
        type: string
        default: ""

jobs:
  run-integration-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FVDB_VIZ_CORE_BUILD_JOBS: 1
      FVDB_VIZ_SKIP_BASE_INSTALL: 1
      FVDB_VIZ_IMAGE_CACHE_ENABLED: 0
      FVDB_VIZ_DOCKER_BUILDER: fvdb-viz-ci
    steps:
      - name: Resolve package selection
        id: config
        run: |
          set -euo pipefail
          stream="${{ inputs.package }}"
          stream="${stream,,}"
          if [[ -z "$stream" ]]; then
            stream="release"
          fi
          if [[ "$stream" != "release" && "$stream" != "dev" ]]; then
            echo "Unsupported package stream: $stream" >&2
            exit 1
          fi
          use_local="false"
          if [[ "${{ inputs.wheel_artifact }}" != "" ]]; then
            use_local="true"
          fi
          {
            echo "package_stream=$stream"
            echo "use_local=$use_local"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export fvdb defaults
        run: |
          set -euo pipefail
          source scripts/fvdb_viz_versions.sh
          {
            echo "FVDB_VIZ_TORCH_VERSION=${FVDB_VIZ_TORCH_VERSION_DEFAULT}"
            echo "FVDB_VIZ_TORCH_INDEX_URL=${FVDB_VIZ_TORCH_INDEX_URL_DEFAULT}"
            echo "FVDB_VIZ_CUDA_ARCH_LIST=${FVDB_VIZ_CUDA_ARCH_LIST_DEFAULT}"
            echo "FVDB_VIZ_CORE_VERSION=${FVDB_VIZ_CORE_VERSION_DEFAULT}"
            echo "FVDB_VIZ_CORE_INDEX_URL=${FVDB_VIZ_CORE_INDEX_URL_DEFAULT}"
            echo "FVDB_VIZ_TEST_IMAGE_BASE=${FVDB_VIZ_TEST_IMAGE_BASE_DEFAULT}"
            echo "FVDB_VIZ_TEST_IMAGE_REVISION=${FVDB_VIZ_TEST_IMAGE_REVISION_DEFAULT}"
            echo "FVDB_VIZ_SCRIPT_TIMEOUT=${FVDB_VIZ_SCRIPT_TIMEOUT_DEFAULT}"
          } >> "$GITHUB_ENV"

      - name: Prepare wheel directory
        run: |
          rm -rf pymodule/dist
          mkdir -p pymodule/dist

      - name: Download wheel artifact
        if: ${{ inputs.wheel_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.wheel_artifact }}
          path: pymodule/dist

      - name: Locate local wheel artifact
        if: ${{ steps.config.outputs.use_local == 'true' }}
        id: local_wheel
        run: |
          set -euo pipefail
          wheel_path=$(python -c "import pathlib, sys; dist = pathlib.Path('pymodule') / 'dist'; matches = sorted(dist.glob('nanovdb_editor*.whl')); sys.stdout.write(str(matches[0]) if matches else ''); sys.exit(0 if matches else 1)")
          if [[ -z "$wheel_path" ]]; then
            echo 'No nanovdb_editor*.whl found in pymodule/dist' >&2
            exit 1
          fi
          echo "host_path=${wheel_path}" >> "$GITHUB_OUTPUT"
          echo "container_path=/workspace/${wheel_path}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/lib/jvm /opt/hostedtoolcache
          sudo apt-get clean
          sudo docker system prune --all --force --volumes || true

      - name: Add swap space
        run: |
          set -euo pipefail
          if sudo swapon --show | grep -q .; then
            echo "Swap already configured; leaving it as-is."
            free -h
            sudo swapon --show
            exit 0
          fi
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          sudo swapon --show

      - name: Configure resource-limited buildx builder
        run: |
          set -euo pipefail
          docker buildx rm "${FVDB_VIZ_DOCKER_BUILDER}" >/dev/null 2>&1 || true
          docker buildx create \
            --name "${FVDB_VIZ_DOCKER_BUILDER}" \
            --driver docker-container \
            --driver-opt "memory=14g" \
            --driver-opt "memory-swap=30g" \
            --driver-opt "cpuset-cpus=0-1" \
            --use \
            --bootstrap
          docker buildx inspect "${FVDB_VIZ_DOCKER_BUILDER}"

      - name: Run fvdb.viz tests
        run: |
          set -euo pipefail

          SCRIPT_ARGS=("--stream" "${{ steps.config.outputs.package_stream }}")

          if [[ "${{ steps.config.outputs.use_local }}" == "true" ]]; then
            SCRIPT_ARGS+=("--local-wheel" "${{ steps.local_wheel.outputs.host_path }}")
          fi

          if [[ -n "${{ inputs.fvdb_source_ref }}" ]]; then
            SCRIPT_ARGS+=("--fvdb-source-ref" "${{ inputs.fvdb_source_ref }}")
          fi

          if [[ -n "${{ inputs.upstream_test_ref }}" ]]; then
            SCRIPT_ARGS+=("--upstream-test-ref" "${{ inputs.upstream_test_ref }}")
          fi

          ./scripts/run_fvdb_viz_integration.sh "${SCRIPT_ARGS[@]}"
