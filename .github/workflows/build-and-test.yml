name: NanoVDB Editor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
        - 'CODEOWNERS'
        - '**.md'
        - 'dev_utils/**'
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

# Allow subsequent pushes to the same PR or REF to cancel any previous jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write
  pull-requests: read
  issues: read

jobs:
  nanovdb-editor-build-and-test-linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vulkan dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
          sudo apt-get install -y libxcb1-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-xinerama0-dev libx11-xcb-dev libxrandr-dev libwayland-dev wayland-protocols libdirectfb-dev

      - name: Run OpenH264 regression build
        run: |
          set -euo pipefail
          chmod +x ./scripts/test_openh264_build.sh
          ./scripts/test_openh264_build.sh

      - name: Build NanoVDB Editor (GLFW disabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rfv

      - name: Build NanoVDB Editor (GLFW enabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rfv

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanovdb-editor-build-linux
          path: |
            build/
          retention-days: 2

      - name: Run GTests
        run: |
          set -e
          export LD_LIBRARY_PATH=$PWD/build/Release/lib:$PWD/build/Release/bin:$LD_LIBRARY_PATH
          ctest --test-dir build/Release/gtests -C Release --output-on-failure --verbose

  nanovdb-editor-build-and-test-macos:
    name: Build and Test (macOS)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vulkan dependencies
        run: |
          set -euo pipefail
          brew install molten-vk

          BREW_PREFIX="$(brew --prefix)"
          MOLTENVK_ICD="$(python3 - <<'PY' "${BREW_PREFIX}"
          import os
          import sys

          root = sys.argv[1]
          for dirpath, _, filenames in os.walk(root):
              if "MoltenVK_icd.json" in filenames:
                  print(os.path.join(dirpath, "MoltenVK_icd.json"))
                  raise SystemExit(0)
          print("")
          PY
          )"

          if [ -z "${MOLTENVK_ICD}" ]; then
            echo "ERROR: MoltenVK_icd.json not found under ${BREW_PREFIX}" >&2
            exit 1
          fi

          echo "Found MoltenVK ICD: ${MOLTENVK_ICD}"
          echo "VK_ICD_FILENAMES=${MOLTENVK_ICD}" >> "${GITHUB_ENV}"
          echo "VK_DRIVER_FILES=${MOLTENVK_ICD}" >> "${GITHUB_ENV}"
          echo "DYLD_LIBRARY_PATH=${BREW_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${BREW_PREFIX}/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"

      - name: Run OpenH264 regression build
        run: |
          set -euo pipefail
          chmod +x ./scripts/test_openh264_build.sh
          ./scripts/test_openh264_build.sh

      - name: Build NanoVDB Editor (GLFW disabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rfv

      - name: Build NanoVDB Editor (GLFW enabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rv

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanovdb-editor-build-macos
          path: |
            build/
          retention-days: 2

      - name: Run GTests
        run: |
          set -e
          export DYLD_LIBRARY_PATH="$PWD/build/Release/lib:$PWD/build/Release/bin:${DYLD_LIBRARY_PATH:-}"
          ctest --test-dir build/Release/gtests -C Release --output-on-failure --verbose

  nanovdb-editor-build-and-test-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build NanoVDB Editor (GLFW disabled)
        run: |
          ./build.bat -rfv

      - name: Build NanoVDB Editor (GLFW enabled)
        run: |
          ./build.bat -rv

      - name: Verify GLFW runtime DLL is present
        run: |
          $GlfwDll = "build\Release\glfw3.dll"
          if (-not (Test-Path $GlfwDll)) {
            Write-Host "ERROR: Expected GLFW runtime DLL was not produced: $GlfwDll"
            Write-Host "GLFW is loaded dynamically at runtime, so local Windows builds must provide glfw3.dll."
            if (Test-Path "build\Release") {
              Write-Host "Contents of build\Release:"
              Get-ChildItem "build\Release" | Select-Object Name, Length | Format-Table -AutoSize
            }
            exit 1
          }
          Write-Host "Found GLFW runtime DLL: $GlfwDll"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanovdb-editor-build-windows
          path: |
            build/
          retention-days: 2

      - name: Install Mesa3D lavapipe
        run: |
          # Download Mesa lavapipe for Windows x64.
          Write-Host "Downloading Mesa lavapipe for x64..."
          $MesaUrl = "https://github.com/mmozeiko/build-mesa/releases/download/24.3.1/mesa-lavapipe-x64-24.3.1.zip"
          $MesaArchive = "$env:TEMP\mesa-lavapipe-x64.zip"
          $MesaDir = "$env:TEMP\mesa-lavapipe-x64"

          if (Test-Path $MesaDir) { Remove-Item -Recurse -Force $MesaDir }
          New-Item -ItemType Directory -Path $MesaDir -Force | Out-Null

          Invoke-WebRequest -Uri $MesaUrl -OutFile $MesaArchive

          # Extract the package.
          Write-Host "Extracting Mesa..."
          Expand-Archive -Path $MesaArchive -DestinationPath $MesaDir -Force

          # Locate lavapipe DLL.
          $VulkanLvpDll = Get-ChildItem -Path $MesaDir -Recurse -File -Filter "vulkan_lvp.dll" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $VulkanLvpDll) {
              Write-Host "ERROR: vulkan_lvp.dll not found in x64 lavapipe package!"
              Get-ChildItem -Path $MesaDir -Recurse -File -Filter "vulkan*.dll" -ErrorAction SilentlyContinue |
                Select-Object -First 50 FullName | Format-Table -AutoSize
              exit 1
          }
          $MesaBinPath = Split-Path -Parent $VulkanLvpDll.FullName
          Write-Host "Using lavapipe DLL: $($VulkanLvpDll.FullName)"
          Write-Host "Using Mesa bin path: $MesaBinPath"

          # Locate ICD JSON (prefer same directory).
          $VulkanICDJson = Get-ChildItem -Path $MesaBinPath -File -Filter "lvp_icd*.json" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $VulkanICDJson) {
              $VulkanICDJson = Get-ChildItem -Path $MesaDir -Recurse -File -Filter "lvp_icd*.json" -ErrorAction SilentlyContinue |
                Select-Object -First 1
          }
          if (-not $VulkanICDJson) {
              Write-Host "ERROR: lvp_icd*.json not found in x64 lavapipe package!"
              Get-ChildItem -Path $MesaDir -Recurse -File -Filter "*.json" -ErrorAction SilentlyContinue |
                Select-Object -First 50 FullName | Format-Table -AutoSize
              exit 1
          }
          $VulkanICDPath = $VulkanICDJson.FullName
          Write-Host "Using lavapipe ICD JSON: $VulkanICDPath"

          # Point the manifest at the extracted driver DLL explicitly.
          $IcdContent = Get-Content $VulkanICDPath -Raw | ConvertFrom-Json
          $IcdContent.ICD.library_path = $VulkanLvpDll.FullName
          $IcdContent | ConvertTo-Json -Depth 10 | Set-Content $VulkanICDPath -Encoding UTF8

          # Prefer env vars so the test job does not rely only on registry state.
          "VK_ICD_FILENAMES=$VulkanICDPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VK_DRIVER_FILES=$VulkanICDPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Best-effort registry registration.
          try {
            $RegistryPath = "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers"
            if (-not (Test-Path $RegistryPath)) { New-Item -Path $RegistryPath -Force | Out-Null }
            New-ItemProperty -Path $RegistryPath -Name $VulkanICDPath -Value 0 -PropertyType DWord -Force | Out-Null
            Write-Host "Registry entry created: $VulkanICDPath"
          } catch {
            Write-Host "WARNING: Could not write Vulkan ICD registry entry: $($_.Exception.Message)"
          }

          # Add Mesa to PATH.
          echo "$MesaBinPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "Lavapipe installed successfully for x64"

      - name: Run GTests
        run: |
          cd build/gtests
          ctest -C Release --output-on-failure --verbose

  nanovdb-editor-build-and-test-windows-arm:
    name: Build and Test (Windows ARM64)
    runs-on: windows-11-arm
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          USE_VCPKG: ON

      - name: Build NanoVDB Editor (GLFW disabled)
        run: |
          ./build.bat -rfv
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          USE_VCPKG: ON

      - name: Build NanoVDB Editor (GLFW enabled)
        run: |
          ./build.bat -rv
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          USE_VCPKG: ON

      - name: Verify GLFW runtime DLL is present
        run: |
          $GlfwDll = "build\Release\glfw3.dll"
          if (-not (Test-Path $GlfwDll)) {
            Write-Host "ERROR: Expected GLFW runtime DLL was not produced: $GlfwDll"
            Write-Host "GLFW is loaded dynamically at runtime, so local Windows builds must provide glfw3.dll."
            if (Test-Path "build\Release") {
              Write-Host "Contents of build\Release:"
              Get-ChildItem "build\Release" | Select-Object Name, Length | Format-Table -AutoSize
            }
            exit 1
          }
          Write-Host "Found GLFW runtime DLL: $GlfwDll"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanovdb-editor-build-windows-arm64
          path: |
            build/
          retention-days: 2

      - name: Install Mesa3D lavapipe
        run: |
          # Download Mesa lavapipe for Windows ARM64 (ARM64 binaries)
          Write-Host "Downloading Mesa lavapipe for ARM64..."
          $MesaUrl = "https://github.com/mmozeiko/build-mesa/releases/download/24.3.1/mesa-lavapipe-arm64-24.3.1.zip"
          $MesaArchive = "$env:TEMP\mesa-lavapipe-arm64.zip"
          $MesaDir = "$env:TEMP\mesa-lavapipe-arm64"

          if (Test-Path $MesaDir) { Remove-Item -Recurse -Force $MesaDir }
          New-Item -ItemType Directory -Path $MesaDir -Force | Out-Null

          Invoke-WebRequest -Uri $MesaUrl -OutFile $MesaArchive

          # Extract
          Write-Host "Extracting Mesa..."
          Expand-Archive -Path $MesaArchive -DestinationPath $MesaDir -Force

          # Locate lavapipe DLL
          $VulkanLvpDll = Get-ChildItem -Path $MesaDir -Recurse -File -Filter "vulkan_lvp.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $VulkanLvpDll) {
              Write-Host "ERROR: vulkan_lvp.dll not found in ARM64 lavapipe package!"
              Get-ChildItem -Path $MesaDir -Recurse -File -Filter "vulkan*.dll" -ErrorAction SilentlyContinue |
                Select-Object -First 50 FullName | Format-Table -AutoSize
              exit 1
          }
          $MesaBinPath = Split-Path -Parent $VulkanLvpDll.FullName
          Write-Host "Using lavapipe DLL: $($VulkanLvpDll.FullName)"
          Write-Host "Using Mesa bin path: $MesaBinPath"

          # Locate ICD JSON (prefer same directory)
          $VulkanICDJson = Get-ChildItem -Path $MesaBinPath -File -Filter "lvp_icd*.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $VulkanICDJson) {
              $VulkanICDJson = Get-ChildItem -Path $MesaDir -Recurse -File -Filter "lvp_icd*.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $VulkanICDJson) {
              Write-Host "ERROR: lvp_icd*.json not found in ARM64 lavapipe package!"
              Get-ChildItem -Path $MesaDir -Recurse -File -Filter "*.json" -ErrorAction SilentlyContinue |
                Select-Object -First 50 FullName | Format-Table -AutoSize
              exit 1
          }
          $VulkanICDPath = $VulkanICDJson.FullName
          Write-Host "Using lavapipe ICD JSON: $VulkanICDPath"

          # Prefer env var (no admin required)
          "VK_ICD_FILENAMES=$VulkanICDPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VK_DRIVER_FILES=$VulkanICDPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Best-effort registry registration (ignored if not permitted)
          try {
            $RegistryPath = "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers"
            if (-not (Test-Path $RegistryPath)) { New-Item -Path $RegistryPath -Force | Out-Null }
            New-ItemProperty -Path $RegistryPath -Name $VulkanICDPath -Value 0 -PropertyType DWord -Force | Out-Null
            Write-Host "Registry entry created: $VulkanICDPath"
          } catch {
            Write-Host "WARNING: Could not write Vulkan ICD registry entry: $($_.Exception.Message)"
          }

          # Add Mesa to PATH
          echo "$MesaBinPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Optional sanity check
          if (Get-Command vulkaninfo -ErrorAction SilentlyContinue) {
            Write-Host "Running vulkaninfo --summary..."
            vulkaninfo --summary || $true
          } else {
            Write-Host "vulkaninfo not found; skipping sanity check"
          }

          Write-Host "Lavapipe installed successfully for ARM64"

      - name: Run GTests
        run: |
          cd build/gtests
          ctest -C Release --output-on-failure --verbose

  nanovdb-editor-build-and-test-linux-arm:
    name: Build and Test (Linux ARM64)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vulkan dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
          sudo apt-get install -y libxcb1-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-xinerama0-dev libx11-xcb-dev libxrandr-dev libwayland-dev wayland-protocols libdirectfb-dev

          # Find lavapipe ICD file (name varies by distro/arch)
          echo "Available Vulkan ICD files:"
          ls -la /usr/share/vulkan/icd.d/ || true

          # Try to find lavapipe ICD
          LVP_ICD=$(find /usr/share/vulkan/icd.d -name "lvp_icd*.json" 2>/dev/null | head -1)
          if [ -n "$LVP_ICD" ]; then
              echo "Found lavapipe ICD: $LVP_ICD"
              export VK_DRIVER_FILES="$LVP_ICD"
          fi
          vulkaninfo --summary || true

      - name: Build NanoVDB Editor (GLFW disabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rfv

      - name: Build NanoVDB Editor (GLFW enabled)
        run: |
          set -e
          chmod +x ./build.sh
          ./build.sh -rfv

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanovdb-editor-build-linux-arm64
          path: |
            build/
          retention-days: 2

      - name: Run GTests
        run: |
          set -e

          # Find lavapipe ICD file dynamically (name varies: lvp_icd.aarch64.json, lvp_icd.arm64.json, etc.)
          LVP_ICD=$(find /usr/share/vulkan/icd.d -name "lvp_icd*.json" 2>/dev/null | head -1)

          if [ -z "$LVP_ICD" ]; then
              echo "ERROR: No lavapipe ICD file found"
              echo "Available ICD files:"
              ls -la /usr/share/vulkan/icd.d/ || true
              exit 1
          fi

          echo "Found lavapipe ICD: $LVP_ICD"

          # Configure lavapipe for software rendering
          export VK_ICD_FILENAMES="$LVP_ICD"
          export VK_DRIVER_FILES="$LVP_ICD"

          # Additional lavapipe configuration
          export LP_NUM_THREADS=1
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe

          echo "Using Vulkan driver: $VK_DRIVER_FILES"
          echo "LP_NUM_THREADS: $LP_NUM_THREADS"

          export LD_LIBRARY_PATH=$PWD/build/Release/lib:$PWD/build/Release/bin:$LD_LIBRARY_PATH
          ctest --test-dir build/Release/gtests -C Release --output-on-failure --verbose
